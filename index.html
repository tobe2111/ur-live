<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- WCAG 1.4.4: pinch-zoom is required for accessibility. Do NOT re-add maximum-scale/user-scalable=no. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- 🛡️ 2026-04-28: 카카오톡/네이버/페북 등 인앱 브라우저 → 안내 페이지 즉시 표시.
         자동 redirect 는 카톡 정책으로 차단 + 무한 루프 케이스 발견 → 사용자가 직접
         외부 브라우저 열도록 안내. document.write 로 페이지 전체 교체 (모듈/React 로드 자체를 차단). -->
    <script>
      (function() {
        try {
          var ua = navigator.userAgent || '';
          var isKakao = /KAKAOTALK/i.test(ua);
          var isNaver = /NAVER\(inapp/i.test(ua);
          var isFB = /FB_IAB|FBAV|FBAN/i.test(ua);
          var isIG = /Instagram/i.test(ua);
          var isLine = /\bLine\//i.test(ua);
          if (!isKakao && !isNaver && !isFB && !isIG && !isLine) return;

          var name = isKakao ? '카카오톡' : isNaver ? '네이버' : isFB ? '페이스북' : isIG ? '인스타그램' : '라인';
          var url = window.location.href;
          var isIOS = /iPhone|iPad|iPod/i.test(ua);
          var isAndroid = /Android/i.test(ua);

          // 안드로이드는 Chrome intent 한 번 시도 (카톡 외 인앱들)
          var tryIntent = '';
          if (isAndroid) {
            var t = url.replace(/^https?:\/\//, '');
            tryIntent = 'intent://' + t + '#Intent;scheme=https;package=com.android.chrome;end';
          }
          // iOS 카톡은 공식 외부브라우저 스킴
          var tryKakaoIOS = (isKakao && isIOS) ? 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url) : '';

          var openBtn = '';
          if (tryIntent || tryKakaoIOS) {
            var schemeUrl = tryKakaoIOS || tryIntent;
            openBtn = '<a href="' + schemeUrl + '" style="display:inline-block;padding:14px 28px;background:#FEE500;color:#3C1E1E;border-radius:24px;font-weight:700;text-decoration:none;font-size:15px;margin:8px;">외부 브라우저 열기</a>';
          }

          var html = ''
            + '<!doctype html><html lang="ko"><head>'
            + '<meta charset="utf-8"/>'
            + '<meta name="viewport" content="width=device-width, initial-scale=1.0"/>'
            + '<title>외부 브라우저로 열어주세요 - 유어딜</title>'
            + '<style>'
            + 'body{margin:0;background:#fbfbfd;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:#1d1d1f;}'
            + '.wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}'
            + '.logo{font-size:28px;font-weight:800;letter-spacing:-0.04em;margin-bottom:8px;}'
            + '.icon{font-size:64px;margin-bottom:16px;}'
            + '.title{font-size:18px;font-weight:700;margin:0 0 12px;}'
            + '.desc{font-size:14px;color:#6e6e73;line-height:1.6;margin:0 0 24px;max-width:340px;}'
            + '.url{background:#f2f2f7;border-radius:12px;padding:14px;margin:8px 0;width:100%;max-width:340px;word-break:break-all;font-size:12px;color:#1d1d1f;}'
            + '.copy{margin-top:8px;padding:10px 20px;background:#007aff;color:#fff;border:0;border-radius:18px;font-size:13px;font-weight:600;cursor:pointer;}'
            + '.hint{margin-top:24px;font-size:12px;color:#8e8e93;line-height:1.6;max-width:300px;}'
            + 'kbd{background:#fff;border:1px solid #d2d2d7;border-radius:4px;padding:2px 6px;font-family:inherit;font-size:11px;font-weight:600;}'
            + '</style></head><body>'
            + '<div class="wrap">'
            +   '<div class="logo">유어딜</div>'
            +   '<div class="icon">🌐</div>'
            +   '<h1 class="title">' + name + ' 인앱 브라우저에서는<br/>유어딜이 동작하지 않아요</h1>'
            +   '<p class="desc">아래 버튼을 누르거나, 우측 상단 메뉴(<kbd>⋮</kbd> 또는 <kbd>⋯</kbd>) 에서<br/><strong>"다른 브라우저로 열기"</strong> 를 선택해주세요.</p>'
            +   openBtn
            +   '<div class="url" id="ud-url">' + url + '</div>'
            +   '<button class="copy" id="ud-copy">URL 복사</button>'
            +   '<p class="hint">위 방법으로도 안 열리면 Chrome / Safari 를 직접 열어 URL 을 붙여넣어주세요.</p>'
            + '</div>'
            + '<script>'
            +   'document.getElementById("ud-copy").addEventListener("click",function(){'
            +     'var t=document.getElementById("ud-url").textContent;'
            +     'var b=this;'
            +     'if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){b.textContent="복사됨 ✓";});}'
            +     'else{var ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);b.textContent="복사됨 ✓";}'
            +   '});'
            + '<' + '/script>'
            + '</body></html>';
          document.open();
          document.write(html);
          document.close();
        } catch (e) { /* never break the page on detect failure */ }
      })();
    </script>

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="유어딜" />
    <meta name="theme-color" content="#020202" />

    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- DNS prefetch + preconnect: 주요 외부 리소스 도메인 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://t1.kakaocdn.net" crossorigin />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://www.youtube.com" crossorigin />
    <link rel="preconnect" href="https://img.youtube.com" crossorigin />

    <!-- Pretendard 웹폰트 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
    <!-- 🛡️ 2026-04-22: font-display: swap — FOUT 허용 (FOIT 방지). 한글 글자 안 보이는 시간 단축. -->
    <style>
      @font-face { font-family: 'Pretendard Variable'; font-display: swap; }
    </style>

    <meta name="description" content="라이브 방송으로 만나는 최저가 특가 상품. 인플루언서 추천 맛집 공동구매, 실시간 라이브 쇼핑" />
    <meta name="keywords" content="라이브커머스,라이브쇼핑,공동구매,맛집,식사권,인플루언서,유어딜" />
    <meta name="author" content="리스터코퍼레이션" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="유어딜 - 라이브 커머스 & 맛집 공동구매" />
    <meta property="og:description" content="라이브 방송으로 만나는 최저가 특가 상품. 인플루언서 추천 맛집 식사권 공동구매!" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://live.ur-team.com" />
    <meta property="og:site_name" content="유어딜" />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="유어딜 - 라이브 커머스" />
    <meta name="twitter:description" content="라이브 방송으로 만나는 최저가 특가 상품" />
    <meta name="naver-site-verification" content="7be066f6c7f451d994e3a5482aa76f87e96c3c2f" />
    <meta property="og:image" content="https://live.ur-team.com/logo.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Kakao SDK (init은 kakao-sdk.ts에서 수행) -->
    <script async src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"
            crossorigin="anonymous"></script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B1ST2L37CM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-B1ST2L37CM');
    </script>

    <!-- YouTube IFrame API (preload for faster live page entry) -->
    <script>
      window.youtubeCallbacks = [];
      window.onYouTubeIframeAPIReady = function() {
        window.youtubeCallbacks.forEach(function(cb) { cb(); });
        window.youtubeCallbacks = { push: function(cb) { cb(); } };
      };
    </script>
    <script src="https://www.youtube.com/iframe_api" async></script>

  </head>
  <body style="background-color:#020202">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:z-[9999] focus:bg-white focus:p-4 focus:text-blue-600 focus:font-bold">본문 바로가기</a>
    <div id="root" role="application" aria-label="유어딜 라이브 커머스">
      <!-- 🛡️ 2026-04-28: React 마운트 실패 / 모듈 로드 지연 시 흰화면 대신 placeholder.
           React 가 마운트되면 자동으로 덮어쓰임 (createRoot.render). -->
      <div id="ur-pre-react" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#020202;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        <div style="text-align:center;padding:24px;">
          <div style="font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:10px;">유어딜</div>
          <div style="font-size:13px;color:#888;">로딩 중...</div>
          <div id="ur-slow-hint" style="display:none;font-size:11px;color:#666;margin-top:24px;max-width:280px;line-height:1.5;">
            10초 이상 멈춰있다면 브라우저 캐시를 비우거나<br/>다른 브라우저(Chrome/Safari)로 열어주세요.
            <br/><br/>
            <a href="javascript:location.reload()" style="color:#4a9eff;text-decoration:none;">↻ 새로고침</a>
          </div>
        </div>
      </div>
      <script>
        // 8초 후에도 placeholder 가 남아있으면 (React 마운트 실패) 사용자에게 안내
        setTimeout(function() {
          var hint = document.getElementById('ur-slow-hint');
          if (hint) hint.style.display = 'block';
        }, 8000);
      </script>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
