<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- WCAG 1.4.4: pinch-zoom is required for accessibility. Do NOT re-add maximum-scale/user-scalable=no. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- 🛡️ 2026-04-28: 카카오톡 인앱 → 외부 브라우저 강제 redirect (ES5, 모듈 로드 전 실행).
         main.tsx 의 redirect 는 ESM import 가 실행돼야 동작 → 옛 WebView/SyntaxError 케이스
         에서 무력. 이 inline script 는 모든 모듈/CSS 보다 먼저 실행돼 흰화면 자체 회피. -->
    <script>
      (function() {
        try {
          var ua = navigator.userAgent || '';
          if (!/KAKAOTALK/i.test(ua)) return;
          // sessionStorage 가드 (무한 redirect 방지)
          try {
            if (sessionStorage.getItem('ur_kakao_external_v1') === '1') return;
            sessionStorage.setItem('ur_kakao_external_v1', '1');
          } catch (e) { /* storage blocked, proceed */ }
          var url = window.location.href;
          var isIOS = /iPhone|iPad|iPod/i.test(ua);
          if (isIOS) {
            window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
          } else {
            var t = url.replace(/^https?:\/\//, '');
            window.location.href = 'intent://' + t + '#Intent;scheme=https;package=com.android.chrome;end';
          }
          // 화면을 비워서 깜빡임 최소화
          document.write('<div style="padding:24px;text-align:center;font-family:sans-serif;color:#333;">외부 브라우저로 이동 중...</div>');
        } catch (e) { /* never break the page on detect failure */ }
      })();
    </script>
