<!doctype html>
<html lang="ko">
  <head>
    <!-- TikTok Console Filter - Must be first to catch all warnings -->
    <script>
      (function() {
        // Save original console methods
        const originalWarn = console.warn;
        const originalError = console.error;
        
        // Filter TikTok iframe warnings
        console.warn = function(...args) {
          const msg = args[0]?.toString() || '';
          if (
            msg.includes('Content Security Policy') ||
            msg.includes('Permissions policy violation') ||
            msg.includes('upgrade-insecure-requests') ||
            msg.includes('unload is not allowed')
          ) {
            return; // Suppress
          }
          originalWarn.apply(console, args);
        };
        
        console.error = function(...args) {
          const msg = args[0]?.toString() || '';
          if (
            msg.includes('Content Security Policy') ||
            msg.includes('Permissions policy')
          ) {
            return; // Suppress
          }
          originalError.apply(console, args);
        };
        
        // Also intercept console.log for violations
        const originalLog = console.log;
        console.log = function(...args) {
          const msg = args[0]?.toString() || '';
          if (
            msg.includes('[Violation]') ||
            msg.includes('Permissions policy violation')
          ) {
            return; // Suppress
          }
          originalLog.apply(console, args);
        };
      })();
    </script>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-B1ST2L37CM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-B1ST2L37CM');
    </script>
    
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>유어 라이브 - 지금 당장 만나는 라이브 쇼핑</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Kakao SDK - Load before React app with error handling -->
    <script>
      (function() {
        console.log('[Kakao SDK] Starting to load...');
        
        // Create script element
        var script = document.createElement('script');
        script.src = 'https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js';
        script.crossOrigin = 'anonymous';
        
        script.onload = function() {
          console.log('[Kakao SDK] Script loaded successfully');
          if (window.Kakao) {
            try {
              if (!window.Kakao.isInitialized()) {
                window.Kakao.init('975a2e7f97254b08f15dba4d177a2865');
                console.log('[Kakao SDK] Initialized:', window.Kakao.isInitialized());
              }
            } catch (e) {
              console.error('[Kakao SDK] Initialization error:', e);
            }
          } else {
            console.error('[Kakao SDK] window.Kakao is undefined after load');
          }
        };
        
        script.onerror = function(e) {
          console.error('[Kakao SDK] Failed to load script:', e);
          console.error('[Kakao SDK] Check network/firewall settings');
        };
        
        document.head.appendChild(script);
      })();
    </script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
      console.log('[Firebase] SDK loaded');
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
