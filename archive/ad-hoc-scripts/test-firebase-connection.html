<!DOCTYPE html>
<html>
<head>
    <title>Firebase Connection Test</title>
    <script type="module">
        // Firebase 설정
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCxmgG3NEXsWtHKbE425dvq5EWs3WHXOh8",
            authDomain: "urteam-live-commerce-5b284.firebaseapp.com",
            databaseURL: "https://urteam-live-commerce-5b284-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "urteam-live-commerce-5b284",
            storageBucket: "urteam-live-commerce-5b284.firebasestorage.app",
            messagingSenderId: "352937066044",
            appId: "1:352937066044:web:e5bfd5e1d8f61688e30d39"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        console.log('✅ Firebase initialized');

        // 테스트 데이터 작성
        async function writeTestData() {
            try {
                // 테스트 스트림 데이터
                await set(ref(database, 'streams/stream1'), {
                    id: 1,
                    title: "테스트 라이브 방송",
                    status: "live",
                    current_product_id: 101,
                    viewer_count: 25,
                    updated_at: Date.now()
                });

                // 테스트 상품 데이터
                await set(ref(database, 'products/product101'), {
                    id: 101,
                    name: "테스트 상품",
                    price: 29900,
                    original_price: 39900,
                    discount_rate: 25,
                    stock: 50,
                    image_url: "https://via.placeholder.com/300",
                    updated_at: Date.now()
                });

                console.log('✅ Test data written successfully');
                document.getElementById('status').innerHTML = '✅ 테스트 데이터 작성 완료!';
            } catch (error) {
                console.error('❌ Error writing data:', error);
                document.getElementById('status').innerHTML = '❌ 에러: ' + error.message;
            }
        }

        // 실시간 리스너
        function listenToStream() {
            const streamRef = ref(database, 'streams/stream1');
            onValue(streamRef, (snapshot) => {
                const data = snapshot.val();
                console.log('🔥 Stream data updated:', data);
                document.getElementById('stream-data').innerHTML = JSON.stringify(data, null, 2);
            });

            const productRef = ref(database, 'products/product101');
            onValue(productRef, (snapshot) => {
                const data = snapshot.val();
                console.log('🔥 Product data updated:', data);
                document.getElementById('product-data').innerHTML = JSON.stringify(data, null, 2);
            });
        }

        // 페이지 로드 시 실행
        window.addEventListener('load', () => {
            document.getElementById('write-btn').addEventListener('click', writeTestData);
            document.getElementById('listen-btn').addEventListener('click', listenToStream);
        });
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 10px 5px;
            font-size: 16px;
            cursor: pointer;
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        #status {
            font-size: 18px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>🔥 Firebase Connection Test</h1>
    
    <div>
        <button id="write-btn">1. 테스트 데이터 작성</button>
        <button id="listen-btn">2. 실시간 리스너 시작</button>
    </div>
    
    <div id="status">대기 중...</div>
    
    <h2>Stream Data:</h2>
    <pre id="stream-data">데이터 없음</pre>
    
    <h2>Product Data:</h2>
    <pre id="product-data">데이터 없음</pre>
    
    <h2>Console:</h2>
    <p>F12를 눌러서 개발자 도구 → Console 탭을 확인하세요.</p>
</body>
</html>
