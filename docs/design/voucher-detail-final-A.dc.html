<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>*{box-sizing:border-box;}body{margin:0;}</style>
</helmet>

<div style="min-height:100vh;background:#E7E9EE;font-family:'Pretendard',-apple-system,sans-serif;padding:56px 24px 80px;display:flex;flex-direction:column;align-items:center;">
  <div style="text-align:center;margin-bottom:28px;">
    <div style="font-size:13px;font-weight:700;letter-spacing:.14em;color:#FFCE00;text-transform:uppercase;background:#1A1D26;display:inline-block;padding:4px 12px;border-radius:999px;">Refined Classic · Final</div>
    <div style="font-size:15px;color:#8A909C;margin-top:12px;">교환 화면 최종안 — 유효기간·사용 안내 보강</div>
  </div>

  <div style="width:390px;height:852px;background:#fff;border-radius:46px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 34px 70px -24px rgba(20,28,45,.32),0 0 0 1px rgba(20,28,45,.05);">
    <!-- status bar -->
    <div style="height:50px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 30px 0 34px;">
      <span style="font-size:15px;font-weight:700;color:#1A1D26;">9:41</span>
      <div style="display:flex;align-items:center;gap:7px;"><div style="width:18px;height:11px;border-radius:2px;background:#1A1D26;"></div><div style="width:16px;height:11px;border-radius:2px;background:#1A1D26;"></div><div style="width:24px;height:12px;border-radius:3px;border:1.5px solid #1A1D26;position:relative;"><div style="position:absolute;inset:2px;width:14px;background:#1A1D26;border-radius:1px;"></div></div></div>
    </div>
    <!-- header -->
    <div style="height:54px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 18px;">
      <div style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#1A1D26;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#1A1D26;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 12a3 3 0 106 0 3 3 0 00-6 0zm10-5l-4 3m0 4l4 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    </div>
    <!-- content -->
    <div style="flex:1;overflow:hidden;padding:6px 22px 0;display:flex;flex-direction:column;">
      <!-- product card -->
      <div style="position:relative;height:278px;flex:none;border-radius:28px;background:linear-gradient(180deg,#F7F8FA,#EFF1F4);display:flex;align-items:center;justify-content:center;overflow:hidden;">
        <div style="position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px -4px rgba(20,28,45,.18);color:#C2C7D0;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 20s-7-4.5-7-9.5A3.5 3.5 0 0112 7a3.5 3.5 0 017 3.5C19 15.5 12 20 12 20z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></div>
        <img src="assets/compose-cup.png" alt="아이스 아메리카노" style="height:242px;object-fit:contain;filter:drop-shadow(0 18px 24px rgba(20,28,45,.18));">
      </div>
      <!-- info -->
      <div style="padding:18px 2px 0;">
        <div style="display:flex;align-items:center;">
          <span style="font-size:11.5px;font-weight:700;color:#1A1D26;background:#FFCE00;border-radius:6px;padding:4px 9px;white-space:nowrap;">모바일 금액권</span>
        </div>
        <h2 style="margin:7px 0 0;font-size:23px;font-weight:800;color:#171B24;letter-spacing:-.01em;">아이스 아메리카노</h2>
        <div style="margin-top:4px;font-size:13.5px;color:#9AA0AB;">4,500원권 · ICED · Tall</div>
        <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-top:16px;">
          <div style="display:flex;align-items:baseline;gap:4px;"><span style="font-size:32px;font-weight:800;color:#171B24;letter-spacing:-.02em;">2,160</span><span style="font-size:18px;font-weight:700;color:#171B24;">딜</span></div>
          <div style="text-align:right;line-height:1.3;"><div style="font-size:12px;color:#B4B9C2;text-decoration:line-through;">정가 ₩4,500</div><div style="font-size:12.5px;font-weight:700;color:#0E9F6E;">52% 할인 교환</div></div>
        </div>
        <div style="height:1px;background:#EEF0F3;margin:16px 0;"></div>
        <div style="display:flex;flex-direction:column;gap:11px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;font-size:13.5px;"><span style="color:#9AA0AB;">유효기간</span><span style="text-align:right;"><span style="color:#3A404C;font-weight:600;">발행일로부터 90일</span><br><span style="font-size:12px;color:#B4B9C2;">~2026.09.15</span></span></div>
          <div style="display:flex;justify-content:space-between;font-size:13.5px;"><span style="color:#9AA0AB;">사용처</span><span style="color:#3A404C;font-weight:600;">전국 가맹 매장</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13.5px;"><span style="color:#9AA0AB;">환불</span><span style="color:#3A404C;font-weight:600;">환불 불가</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:14px;color:#A2A8B2;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M12 11v5m0-8h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <span style="font-size:12px;">매장에서 바코드 제시 후 사용 가능</span>
        </div>
      </div>
    </div>
    <!-- bottom bar -->
    <div style="flex:none;padding:12px 22px 26px;border-top:1px solid #F0F2F5;background:#fff;">
      <div style="display:flex;align-items:center;justify-content:space-between;background:#F6F7F9;border-radius:12px;padding:11px 14px;margin-bottom:12px;">
        <span style="font-size:12.5px;color:#8A909C;">보유 <b style="color:#3A404C;font-weight:600;">12,480딜</b></span>
        <div style="display:flex;align-items:baseline;gap:7px;"><span style="font-size:11.5px;font-weight:600;color:#8A909C;">교환 후</span><span style="font-size:18px;font-weight:800;color:#171B24;letter-spacing:-.02em;">10,320딜</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="display:flex;align-items:center;gap:14px;border:1px solid #E6E9ED;border-radius:14px;padding:0 14px;height:54px;flex:none;"><span style="color:#C2C7D0;font-size:20px;font-weight:600;">−</span><span style="font-size:16px;font-weight:700;color:#1A1D26;min-width:14px;text-align:center;">1</span><span style="color:#1A1D26;font-size:20px;font-weight:600;">+</span></div>
        <button style="flex:1;height:54px;border:none;border-radius:14px;background:linear-gradient(180deg,#222B3F,#10172A);color:#fff;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;">2,160딜로 교환하기</button>
      </div>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
