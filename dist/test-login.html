<!DOCTYPE html>
<html>
<head>
    <title>Kakao Login Test</title>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>
</head>
<body>
    <h1>Kakao 로그인 테스트</h1>
    <button onclick="loginKakao()">카카오 로그인</button>
    
    <script>
        // Initialize Kakao SDK
        Kakao.init('975a2e7f97254b08f15dba4d177a2865');
        console.log('Kakao SDK initialized:', Kakao.isInitialized());
        
        function loginKakao() {
            console.log('Starting Kakao login...');
            Kakao.Auth.authorize({
                redirectUri: 'https://live.ur-team.com/auth/kakao/sync/callback',
                state: '/live/15',
                throughTalk: false
            });
        }
        
        // Check for login callback
        const urlParams = new URLSearchParams(window.location.search);
        const loginSuccess = urlParams.get('login');
        const error = urlParams.get('error');
        const detail = urlParams.get('detail');
        
        if (loginSuccess) {
            console.log('✅ Login successful!');
            document.body.innerHTML += '<p style="color: green">✅ 로그인 성공!</p>';
        }
        
        if (error) {
            console.error('❌ Login error:', error, detail);
            document.body.innerHTML += `<p style="color: red">❌ 로그인 실패: ${error} - ${detail}</p>`;
        }
    </script>
</body>
</html>
