    <!-- TikTok, YouTube, and TossPayments Console Filter - Must be first to catch all warnings -->
    <script>
      (function() {
        // Save original console methods
        const originalWarn = console.warn;
        const originalError = console.error;
        
        // Filter TikTok iframe warnings, YouTube errors, and TossPayments errors
        console.warn = function(...args) {
          const msg = args[0]?.toString() || '';
          if (
            msg.includes('Content Security Policy') ||
            msg.includes('Permissions policy violation') ||
            msg.includes('upgrade-insecure-requests') ||
            msg.includes('unload is not allowed') ||
            msg.includes('passive') ||
            msg.includes('Violation') ||
            msg.includes('touchstart')
          ) {
            return; // Suppress
          }
          originalWarn.apply(console, args);
        };
        
        console.error = function(...args) {
          const msg = args[0]?.toString() || '';
          if (
            msg.includes('Content Security Policy') ||
            msg.includes('Permissions policy') ||
            msg.includes('Failed to launch') ||
            msg.includes('intent://') ||
            msg.includes('scheme does not have a registered handler') ||
            msg.includes('postMessage') ||
            msg.includes('youtube') ||
            msg.includes('DOMWindow') ||
            msg.includes('tosspayments.com/v1/log') ||
            msg.includes('log.tosspayments')
          ) {
            return; // Suppress
          }
          originalError.apply(console, args);
        };
        
        // Also intercept console.log for violations
        const originalLog = console.log;
        console.log = function(...args) {
          const msg = args[0]?.toString() || '';
          if (
            msg.includes('[Violation]') ||
            msg.includes('Permissions policy violation')
          ) {
            return; // Suppress
          }
          originalLog.apply(console, args);
        };
        
        // Intercept window errors
        window.addEventListener('error', function(e) {
          if (e.message && (e.message.includes('postMessage') || 
                            e.message.includes('youtube') ||
                            e.message.includes('tosspayments'))) {
            e.stopPropagation();
            e.preventDefault();
          }
        }, true);
        
        // Intercept fetch requests to suppress TossPayments logging errors
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
          const url = args[0];
          if (typeof url === 'string' && url.includes('log.tosspayments.com')) {
            return Promise.resolve(new Response('{}', { status: 200 }));
          }
          return originalFetch.apply(this, args);
        };
      })();
    </script>

    <!-- 🔴 CRITICAL: React 앱을 먼저 로드하고, SDK는 동적으로 로드 -->
    <!-- ⚠️ WARNING: SDK를 React 앱보다 먼저 로드하면 forwardRef 에러 발생! -->
    
    <!-- Kakao SDK - Load AFTER React with defer -->
    <script defer>
      (function() {
        // React 로드 후 실행 보장
        window.addEventListener('DOMContentLoaded', function() {
          console.log('[Kakao SDK] Starting to load...');
          
          // Create script element
          var script = document.createElement('script');
          script.src = 'https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js';
          script.crossOrigin = 'anonymous';
          
          script.onload = function() {
            console.log('[Kakao SDK] Script loaded successfully');
            if (window.Kakao) {
              try {
                if (!window.Kakao.isInitialized()) {
                  window.Kakao.init('975a2e7f97254b08f15dba4d177a2865');
                  console.log('[Kakao SDK] Initialized:', window.Kakao.isInitialized());
                }
              } catch (e) {
                console.error('[Kakao SDK] Initialization error:', e);
              }
            } else {
              console.error('[Kakao SDK] window.Kakao is undefined after load');
            }
          };
          
          script.onerror = function(e) {
            console.error('[Kakao SDK] Failed to load script:', e);
            console.error('[Kakao SDK] Check network/firewall settings');
          };
          
          document.head.appendChild(script);
        });
      })();
    </script>
