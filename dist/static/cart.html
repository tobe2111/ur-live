    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        const API_BASE = '/api';
        let cartItems = [];
        let userId = null;
        const SHIPPING_FEE = 3000; // 배송비 고정 3,000원

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            // Check login
            userId = localStorage.getItem('userId');
            if (!userId) {
                alert('로그인이 필요합니다.');
                window.location.href = '/';
                return;
            }

            // Load cart items
            await loadCartItems();
        });

        // Load cart items
        async function loadCartItems() {
            try {
                const response = await axios.get(`${API_BASE}/cart/${userId}`);
                cartItems = response.data.data || [];

                document.getElementById('loading').style.display = 'none';

                if (cartItems.length === 0) {
                    document.getElementById('empty-cart').style.display = 'block';
                } else {
                    document.getElementById('cart-items').style.display = 'block';
                    document.getElementById('shipping-form').style.display = 'block';
                    document.getElementById('summary-box').style.display = 'block';
                    document.getElementById('checkout-btn').style.display = 'block';
                    
                    renderCartItems();
                    updateSummary();
                }
            } catch (error) {
                console.error('Failed to load cart:', error);
                document.getElementById('loading').style.display = 'none';
                alert('장바구니를 불러오는데 실패했습니다.\n' + (error.response?.data?.error || error.message));
            }
        }

        // Render cart items
        function renderCartItems() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';

            cartItems.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = 'cart-item';
                itemEl.innerHTML = `
                    <img src="${item.image_url || 'https://via.placeholder.com/80'}" 
                         alt="${item.product_name}" 
                         class="item-image"
                         onerror="this.src='https://via.placeholder.com/80'">
                    <div class="item-info">
                        <div class="item-name">${item.product_name}</div>
                        ${item.option_value ? `<div class="item-option">옵션: ${item.option_value}</div>` : ''}
                        <div class="item-price">${formatPrice(item.price_snapshot)}원</div>
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">
                                <i class="fas fa-minus"></i>
                            </button>
                            <span class="quantity-value">${item.quantity}</span>
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">
                                <i class="fas fa-plus"></i>
                            </button>
                            <button class="delete-btn" onclick="deleteItem(${item.id})">
                                <i class="fas fa-trash"></i> 삭제
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(itemEl);
            });
        }

        // Update quantity
        async function updateQuantity(cartItemId, newQuantity) {
            if (newQuantity < 1) {
                if (!confirm('상품을 삭제하시겠습니까?')) {
                    return;
                }
                await deleteItem(cartItemId);
                return;
            }

            try {
                const response = await axios.put(`${API_BASE}/cart/${cartItemId}`, {
                    quantity: newQuantity
                });

                if (response.data.success) {
                    // Update local data
                    const item = cartItems.find(i => i.id === cartItemId);
                    if (item) {
                        item.quantity = newQuantity;
                    }
                    
                    renderCartItems();
                    updateSummary();
                } else {
                    throw new Error(response.data.error || '수량 변경에 실패했습니다');
                }
            } catch (error) {
                console.error('Failed to update quantity:', error);
                alert('수량 변경에 실패했습니다.\n' + (error.response?.data?.error || error.message));
            }
        }

        // Delete item
        async function deleteItem(cartItemId) {
            try {
                const response = await axios.delete(`${API_BASE}/cart/${cartItemId}`);

                if (response.data.success) {
                    // Remove from local data
                    cartItems = cartItems.filter(i => i.id !== cartItemId);
                    
                    if (cartItems.length === 0) {
                        document.getElementById('cart-items').style.display = 'none';
                        document.getElementById('shipping-form').style.display = 'none';
                        document.getElementById('summary-box').style.display = 'none';
                        document.getElementById('checkout-btn').style.display = 'none';
                        document.getElementById('empty-cart').style.display = 'block';
                    } else {
                        renderCartItems();
                        updateSummary();
                    }
                } else {
                    throw new Error(response.data.error || '상품 삭제에 실패했습니다');
                }
            } catch (error) {
                console.error('Failed to delete item:', error);
                alert('상품 삭제에 실패했습니다.\n' + (error.response?.data?.error || error.message));
            }
        }

        // Update summary
        function updateSummary() {
            const subtotal = cartItems.reduce((sum, item) => {
                return sum + (item.price_snapshot * item.quantity);
            }, 0);

            const total = subtotal + SHIPPING_FEE;

            document.getElementById('subtotal').textContent = formatPrice(subtotal) + '원';
            document.getElementById('total').textContent = formatPrice(total) + '원';
        }

        // Format price
        function formatPrice(price) {
            return new Intl.NumberFormat('ko-KR').format(price);
        }

        // Checkout
        document.getElementById('checkout-btn').addEventListener('click', async () => {
            // Validate form
            const recipientName = document.getElementById('recipient-name').value.trim();
            const recipientPhone = document.getElementById('recipient-phone').value.trim();
            const recipientAddress = document.getElementById('recipient-address').value.trim();
            const recipientAddressDetail = document.getElementById('recipient-address-detail').value.trim();
            const deliveryMemo = document.getElementById('delivery-memo').value.trim();

            if (!recipientName) {
                alert('받는 분 이름을 입력해주세요.');
                document.getElementById('recipient-name').focus();
                return;
            }

            if (!recipientPhone) {
                alert('연락처를 입력해주세요.');
                document.getElementById('recipient-phone').focus();
                return;
            }

            if (!recipientAddress) {
                alert('주소를 입력해주세요.');
                document.getElementById('recipient-address').focus();
                return;
            }

            // Calculate total
            const subtotal = cartItems.reduce((sum, item) => {
                return sum + (item.price_snapshot * item.quantity);
            }, 0);
            const totalAmount = subtotal + SHIPPING_FEE;

            // Create order
            try {
                const orderData = {
                    userId: userId,
                    items: cartItems.map(item => ({
                        productId: item.product_id,
                        optionId: item.option_id || null,
                        quantity: item.quantity,
                        price: item.price_snapshot
                    })),
                    shippingAddress: recipientAddress,
                    shippingAddressDetail: recipientAddressDetail,
                    recipientName: recipientName,
                    recipientPhone: recipientPhone,
                    deliveryMemo: deliveryMemo,
                    totalAmount: totalAmount,
                    shippingFee: SHIPPING_FEE
                };

                console.log('Creating order:', orderData);

                const response = await axios.post(`${API_BASE}/api/orders`, orderData);

                if (response.data.success) {
                    const order = response.data.data;
                    const orderNo = order.orderNo;
                    
                    console.log('✅ 주문 생성 완료:', orderNo);
                    
                    // NicePay 결제 시작
                    initiateNicePayPayment(order, {
                        recipientName: recipientName,
                        recipientPhone: recipientPhone,
                        address: recipientAddress + ' ' + recipientAddressDetail
                    });
                } else {
                    throw new Error(response.data.error || '주문 생성에 실패했습니다');
                }
            } catch (error) {
                console.error('Failed to create order:', error);
                alert('주문 생성에 실패했습니다.\n' + (error.response?.data?.error || error.message));
            }
        });
        
        // NicePay 결제 함수
        function initiateNicePayPayment(order, shippingInfo) {
            console.log('🔵 NicePay 결제 시작:', order);
            
            // Client ID 설정 (Worker에서 주입된 환경 변수 사용)
            const NICEPAY_CLIENT_ID = window.NICEPAY_CLIENT_ID || 'S2_d5ec29558e9d46419bf01eb828ca0834';  // 폴백: 테스트 Client ID
            
            console.log('🔑 NicePay Client ID:', NICEPAY_CLIENT_ID.substring(0, 10) + '...');
            
            // 상품명 생성 (첫 번째 상품명 + 외 N건)
            const goodsName = cartItems.length > 1 
                ? `${cartItems[0].product_name} 외 ${cartItems.length - 1}건`
                : cartItems[0].product_name;
            
            // NicePay 결제 요청
            AUTHNICE.requestPay({
                clientId: NICEPAY_CLIENT_ID,
                method: 'card',  // 결제 수단: card(카드), vbank(가상계좌), bank(계좌이체)
                orderId: order.orderNo,
                amount: order.totalAmount,
                goodsName: goodsName,
                returnUrl: window.location.origin + '/payment-result',  // 결제 결과 페이지
                fnError: function(result) {
                    // 결제 실패
                    console.error('❌ NicePay 결제 실패:', result);
                    alert('결제에 실패했습니다.\n' + (result.errorMsg || '알 수 없는 오류'));
                }
            });
        }
    </script>
