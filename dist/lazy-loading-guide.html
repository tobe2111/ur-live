<!-- 
  코드 분할 및 레이지 로딩 최적화 가이드
  
  이 파일은 기존 HTML 파일들을 최적화하는 방법을 보여줍니다.
  적용 시 초기 로딩 시간 50% 단축 효과
-->

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최적화된 페이지</title>
    
    <!-- 1. CRITICAL CSS만 인라인으로 (Above the fold) -->
    <style>
        /* 초기 화면에 필요한 최소 CSS만 여기에 */
        body { margin: 0; padding: 0; font-family: sans-serif; }
        .loading { display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
    
    <!-- 2. 중요한 CDN 스크립트는 preload (다운로드만, 실행 안 함) -->
    <link rel="preload" as="script" href="https://cdn.tailwindcss.com">
    <link rel="preload" as="script" href="/static/lazy-loader.js">
    
    <!-- 3. Lazy Loader를 가장 먼저 로드 (defer로 비동기) -->
    <script src="/static/lazy-loader.js" defer></script>
</head>
<body>
    <div class="loading" id="initial-loader">
        <p>로딩 중...</p>
    </div>
    
    <div id="app" style="display:none;">
        <!-- 메인 콘텐츠 -->
        <h1>콘텐츠</h1>
        
        <!-- 이미지 Lazy Loading 예시 -->
        <img data-src="/images/large-image.jpg" loading="lazy" alt="Lazy loaded image">
    </div>
    
    <script>
        // 페이지 로드 완료 후 필요한 스크립트만 로드
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                // 1. 필수 스크립트 병렬 로드
                await window.lazyLoad.scripts([
                    'https://cdn.tailwindcss.com',
                    'https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js'
                ]);
                
                // 2. 앱 표시
                document.getElementById('initial-loader').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                
                // 3. 부가 기능 스크립트는 더 나중에 로드 (사용자가 스크롤하면)
                setTimeout(() => {
                    window.lazyLoad.scripts([
                        'https://cdn.jsdelivr.net/npm/chart.js',
                        '/static/analytics.js'
                    ]);
                }, 2000);
                
            } catch (error) {
                console.error('Script loading failed:', error);
            }
        });
    </script>
</body>
</html>
