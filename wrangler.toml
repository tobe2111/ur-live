name = "ur-live"
# Note: When deploying, use --project-name ur-live
# This project is connected to live.ur-team.com
compatibility_date = "2026-02-01"
pages_build_output_dir = "./dist"
compatibility_flags = ["nodejs_compat"]

# Environment Variables (Set via Cloudflare Pages Dashboard or wrangler secret)
# Required secrets:
# - RESEND_API_KEY: Resend API key for email notifications
# - JWT_SECRET: Secret key for JWT token generation
# - TOSS_SECRET_KEY: Toss Payments secret key (production)
# - EMAIL_FROM: Email sender address (e.g., "UR Live <noreply@ur-team.com>")
#
# Set production secrets:
# npx wrangler pages secret put RESEND_API_KEY
# npx wrangler pages secret put JWT_SECRET
# npx wrangler pages secret put TOSS_SECRET_KEY
# npx wrangler pages secret put EMAIL_FROM

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "toss-live-commerce-db"
database_id = "d9530ba6-7a26-4c02-9295-3ce5aef112a3"

# KV Namespaces (최적화됨 - RATE_LIMIT_KV 제거)
[[kv_namespaces]]
binding = "SESSION_KV"
id = "3b522e69651f4d4f84a0cdf9430eeb72"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "25ecc9ce2c464dd59edf5eb7d5fd1a10"

[[kv_namespaces]]
binding = "LIVE_CACHE"
id = "e6667599e01d4af8b4687560eb39394c"
preview_id = "750e3b6ed7714a8999abe19d8771be00"

# ❌ RATE_LIMIT_KV 제거됨 (Task 4: Code Cleanup)
# 사용하지 않는 KV 네임스페이스로 리소스 낭비 제거

# Cron Triggers (Scheduled Events) - Workers only, not supported in Pages
# For Pages, use Cloudflare Workers cron triggers or external schedulers
# [triggers]
# crons = ["0 0 1 * *"]
