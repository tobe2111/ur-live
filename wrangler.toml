name = "global-marketplace"
main = "src/worker/index.ts"
compatibility_date = "2024-09-25"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build:client"

[assets]
directory = "dist/client"

# ============================================================
# D1 Database
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "marketplace-db"
database_id = "local-marketplace-db"

# ============================================================
# KV Namespaces (create via: wrangler kv:namespace create NAME)
# ============================================================
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "YOUR_KV_NAMESPACE_ID"

# [[kv_namespaces]]
# binding = "SESSION_KV"
# id = "YOUR_SESSION_KV_ID"

# ============================================================
# Durable Objects (for live streaming)
# ============================================================
[durable_objects]
bindings = [
  { name = "LIVE_STREAM", class_name = "LiveStreamDurableObject" }
]

[[migrations]]
tag = "v1"
new_classes = ["LiveStreamDurableObject"]

# ============================================================
# Development Variables
# ============================================================
[vars]
ENVIRONMENT = "development"
TOSS_CLIENT_KEY = "test_ck_placeholder"
FRONTEND_URL = "http://localhost:5173"
REGION = "KR"

# ============================================================
# Production Secrets — set via Cloudflare dashboard or:
#   wrangler secret put TOSS_SECRET_KEY
#   wrangler secret put TOSS_WEBHOOK_SECRET
#   wrangler secret put JWT_SECRET
#   wrangler secret put FIREBASE_PROJECT_ID
#   wrangler secret put FIREBASE_PRIVATE_KEY
#   wrangler secret put FIREBASE_CLIENT_EMAIL
#   wrangler secret put FIREBASE_DATABASE_URL
#   wrangler secret put KAKAO_REST_API_KEY
#   wrangler secret put YOUTUBE_CLIENT_ID
#   wrangler secret put YOUTUBE_CLIENT_SECRET
#   wrangler secret put VAPID_PUBLIC_KEY
#   wrangler secret put VAPID_PRIVATE_KEY
#   wrangler secret put DISCORD_WEBHOOK_URL
#   wrangler secret put SENTRY_DSN
# ============================================================

# ============================================================
# [env.production] — override vars for production
# ============================================================
[env.production]
name = "global-marketplace"
vars = { ENVIRONMENT = "production", FRONTEND_URL = "https://live.ur-team.com", REGION = "KR" }

# ============================================================
# Local dev server
# ============================================================
[dev]
port = 8787
local_protocol = "http"
persist_to = ".wrangler/state"
