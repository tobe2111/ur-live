# ============================================================
# Cloudflare Pages Configuration
#
# ⚠️ 이 프로젝트는 Cloudflare Pages (with _worker.js advanced routing) 입니다.
# - 배포 명령: `npx wrangler@3 pages deploy dist/client --project-name=ur-live`
# - `wrangler deploy` (Workers용) 사용 금지 — 부적합 + 배포 꼬임 유발
# - `live.ur-team.com` Custom Domain 은 Pages 프로젝트 `ur-live`에 연결
# - Secret 관리: Dashboard → Workers & Pages → ur-live (Pages) → Settings → Secrets
#
# 2026-04-22 사고 기록:
# Workers 프로젝트가 Custom Domain을 가로채 secret 없이 동작 → 로그인 500 이틀 지속.
# 상세는 CLAUDE.md "2026-04-22 사고 요약" 참조.
# ============================================================

name = "ur-live"
main = "src/worker/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

# Build command: Cloudflare Workers CI가 빌드 전 프론트엔드를 생성하도록
[build]
command = "npm run build"

# Static assets (React SPA)
[assets]
directory = "./dist/client"

# ============================================================
# D1 Database
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "toss-live-commerce-db"
database_id = "d9530ba6-7a26-4c02-9295-3ce5aef112a3"

# ============================================================
# KV Namespaces — 🚨 운영 필수 (DDoS / brute-force 방어)
# ============================================================
# 이 파일에 id 가 비어있어도 Pages 배포는 통과하지만,
# Cloudflare Dashboard → Workers & Pages → ur-live (Pages) → Settings → Bindings
# 에 RATE_LIMIT_KV / SESSION_KV namespace 가 등록되어야 production rate limit 작동.
#
# 미등록 시 영향 (src/worker/middleware/rate-limiter.ts:90 참조):
#   - 비-인증 라우트: rate limit 무력화 (fail-OPEN, 콘솔 경고)
#   - 인증 라우트 (login/refresh 등): fail-CLOSED → 일시적 모든 요청 429
#
# 확인 방법:
#   curl -I https://live.ur-team.com/api/products
#   → X-RateLimit-Limit / X-RateLimit-Remaining 헤더 있어야 정상
#
# 등록 방법 (CLI):
#   wrangler kv:namespace create RATE_LIMIT_KV
#   wrangler kv:namespace create SESSION_KV
#   → 출력된 id 를 Dashboard Bindings 에 등록 (또는 아래 주석 풀어서 사용)
#
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "YOUR_KV_NAMESPACE_ID"

# [[kv_namespaces]]
# binding = "SESSION_KV"
# id = "YOUR_SESSION_KV_ID"

# ============================================================
# R2 Buckets (D1 백업 + 정산 송장 저장)
# ============================================================
# 활성화: 1) Cloudflare Dashboard → R2 → bucket 'ur-live-backups' 생성
#         2) 아래 3줄 주석 해제 후 wrangler 재배포
#         3) 자동 동작:
#            - 매주 일요일 20:00 UTC: D1 dump → backups/d1-YYYY-MM-DD.sql
#            - 매월 1일 09:00 KST: 정산 송장 → invoices/YYYY-MM/INV-*.html
#         4) (선택) R2 lifecycle: 30일 자동 삭제 설정
#
# [[r2_buckets]]
# binding = "BACKUP_BUCKET"
# bucket_name = "ur-live-backups"

# ============================================================
# Durable Objects (for live streaming)
# One DO instance per stream — handles WebSocket chat + product/viewer broadcasts
# ============================================================
[durable_objects]
bindings = [
  { name = "LIVE_STREAM", class_name = "LiveStreamDurableObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LiveStreamDurableObject"]

# ============================================================
# Development Variables
# ============================================================
[vars]
# ENVIRONMENT is set via Cloudflare Dashboard
FRONTEND_URL = "https://live.ur-team.com"
SCRAPER_URL = "https://live.ur-team.com"
# REGION is set via Cloudflare Dashboard

# ============================================================
# Cron Triggers (Scheduled Tasks)
# ============================================================
# 5분마다 실행: 만료 정리, 자동 상태 전환, 자동 정산
# - 라이브 30분 미활동 → 자동 종료
# - 미결제 주문 24시간 → 자동 취소 + 재고 복구
# - 공동구매/바우처/경매/타임딜 만료
# - 자동 구매확정 (배송 14일 경과)
# - 오래된 알림/토큰 정리
# - 바우처 자동 정산 (사용 후 7일 경과)
# UTC 18:00 = KST 03:00 daily trigger for settlement
# UTC Monday 00:00 = KST Monday 09:00 — 에이전시 자동 정산 (P0 #3)
[triggers]
# 5min: 짧은 cleanup
# 18:00 UTC: 자동 정산 + voucher 환불 + 일일 진단 + 캠페인 집계 + 셀러 신청 평가 + 의무 작업 갱신
# 19:00 UTC: reconciliation
# 일요일 20:00 UTC (KST 월요일 05:00): D1 백업 → R2 (BACKUP_BUCKET 바인딩 있어야 동작)
# 월요일 00:00 UTC (KST 09:00): 에이전시 자동 정산 + 인센티브 재계산 + 등급 평가
crons = ["*/5 * * * *", "0 18 * * *", "0 19 * * *", "0 20 * * 0", "0 0 * * 1"]

# ============================================================
# Production Secrets — NEVER add actual secrets here!
# ============================================================
# ⚠️ SECURITY WARNING:
# - wrangler.toml is committed to Git
# - NEVER put real secrets in [vars] section
# - Use wrangler CLI to add secrets securely:
#
# HOW TO ADD SECRETS:
# 1. Use wrangler CLI (encrypts and stores in Cloudflare):
#    wrangler secret put SECRET_NAME
#    (Then enter the secret value when prompted)
#
# 2. Or use Cloudflare Dashboard:
#    Workers & Pages → Your Worker → Settings → Variables → Encrypt
#
# REQUIRED SECRETS (must be added via wrangler secret put):
#   wrangler secret put TOSS_SECRET_KEY             # Toss Payments secret key (sk_test_... or sk_live_...)
#   wrangler secret put JWT_SECRET                  # JWT signing secret (min 32 chars, generate with: openssl rand -hex 32)
#   wrangler secret put FIREBASE_PROJECT_ID         # Firebase project ID
#   wrangler secret put FIREBASE_PRIVATE_KEY        # Firebase Admin SDK private key (PEM format)
#   wrangler secret put FIREBASE_CLIENT_EMAIL       # Firebase Admin SDK service account email
#   wrangler secret put FIREBASE_DATABASE_URL       # Firebase Realtime Database URL
#   wrangler secret put KAKAO_REST_API_KEY          # Kakao OAuth REST API key
#   wrangler secret put ADMIN_EMAIL                 # Admin login email
#   wrangler secret put ADMIN_PASSWORD              # Admin login password
#   wrangler secret put SELLER_EMAIL                # Seller login email
#   wrangler secret put SELLER_PASSWORD             # Seller login password
#
# OPTIONAL SECRETS (add if using these features):
#   wrangler secret put TOSS_WEBHOOK_SECRET         # Toss webhook validation secret
#   wrangler secret put YOUTUBE_CLIENT_ID           # YouTube OAuth client ID
#   wrangler secret put YOUTUBE_CLIENT_SECRET       # YouTube OAuth client secret
#   wrangler secret put YOUTUBE_API_KEY             # YouTube Data API key
#   wrangler secret put ALIMTALK_API_KEY            # Alimtalk API key
#   wrangler secret put ALIMTALK_SENDER_KEY         # Alimtalk sender key
#   wrangler secret put VAPID_PUBLIC_KEY            # Web Push VAPID public key
#   wrangler secret put VAPID_PRIVATE_KEY           # Web Push VAPID private key
#   wrangler secret put DISCORD_WEBHOOK_URL         # Discord notification webhook
#   wrangler secret put SENTRY_DSN                  # Sentry error tracking DSN
#
# VERIFY SECRETS:
#   wrangler secret list                            # List all configured secrets
#   wrangler secret delete SECRET_NAME              # Delete a secret
#
# See SECRET_MANAGEMENT.md for detailed security guidelines
# ============================================================

# ============================================================
# [env.production] — override vars for production
# ============================================================
[env.production]
name = "global-marketplace"
# All variables are set via Cloudflare Dashboard
# vars = { FRONTEND_URL = "https://live.ur-team.com" }

# D1 Database binding for production
[[env.production.d1_databases]]
binding = "DB"
database_name = "toss-live-commerce-db"
database_id = "d9530ba6-7a26-4c02-9295-3ce5aef112a3"

# Durable Objects binding for production (required for WebSocket chat)
[env.production.durable_objects]
bindings = [
  { name = "LIVE_STREAM", class_name = "LiveStreamDurableObject" }
]

# ============================================================
# Local dev server
# ============================================================
[dev]
port = 8787
local_protocol = "http"
