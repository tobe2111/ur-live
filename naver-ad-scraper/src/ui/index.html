<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>네이버 광고주 이메일 수집기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #03C75A;
      --green-dark: #02a84c;
      --bg: #f5f6f8;
      --card: #fff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --border: #e5e7eb;
      --red: #ef4444;
      --blue: #3b82f6;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--green);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header span { font-size: 13px; opacity: .85; }
    .badge {
      background: rgba(255,255,255,.2);
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      padding: 24px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 20px;
    }
    .card h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 16px;
    }

    /* Form */
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    textarea, input, select {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color .15s;
      outline: none;
    }
    textarea:focus, input:focus, select:focus { border-color: var(--green); }
    textarea { resize: vertical; min-height: 100px; }

    .field { margin-bottom: 16px; }
    .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all .15s;
      width: 100%;
    }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-danger { background: var(--red); color: #fff; width: auto; padding: 8px 16px; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--text); width: auto; }
    .btn-ghost:hover { border-color: var(--green); color: var(--green); }

    /* Progress */
    #progress-section { display: none; }
    .progress-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    #status-text { font-size: 14px; font-weight: 600; }
    .progress-bar-wrap {
      background: var(--bg);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    #progress-bar {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      width: 0%;
      transition: width .4s;
    }
    #phase-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      background: #ecfdf5;
      color: #065f46;
      margin-bottom: 8px;
    }
    #current-item {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 12px;
    }

    /* Log */
    #log {
      background: #0f172a;
      color: #94a3b8;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.6;
      height: 160px;
      overflow-y: auto;
    }
    #log .log-info { color: #94a3b8; }
    #log .log-found { color: #4ade80; }
    #log .log-error { color: #f87171; }
    #log .log-done { color: #facc15; font-weight: bold; }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }
    .stat-card .num {
      font-size: 28px;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
    }
    .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* Sessions */
    .session-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .session-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      transition: border-color .15s;
    }
    .session-item:hover, .session-item.active { border-color: var(--green); }
    .session-item.active { background: #f0fdf4; }
    .session-name { font-size: 13px; font-weight: 600; }
    .session-meta { font-size: 11px; color: var(--muted); }
    .session-status {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .s-running { background: #dbeafe; color: #1d4ed8; }
    .s-done { background: #dcfce7; color: #15803d; }
    .s-error { background: #fee2e2; color: #b91c1c; }

    /* Table */
    .table-wrap { overflow: auto; max-height: 400px; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      background: var(--bg);
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    td { padding: 10px 12px; border-top: 1px solid var(--border); }
    tr:hover td { background: #f9fafb; }
    .email-cell { font-weight: 600; color: var(--blue); }
    .tag {
      display: inline-block;
      background: #f0fdf4;
      color: #065f46;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 10px;
    }
    .empty { text-align: center; padding: 40px; color: var(--muted); }

    /* Export bar */
    .export-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    #result-count { font-size: 13px; color: var(--muted); }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <path d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  </svg>
  <h1>네이버 광고주 이메일 수집기</h1>
  <span class="badge">파워링크 전용</span>
</header>

<div class="layout">

  <!-- 왼쪽: 입력 패널 -->
  <div>
    <div class="card" style="margin-bottom:16px">
      <h2>수집 설정</h2>

      <div class="field">
        <label>검색 키워드</label>
        <textarea id="keywords" placeholder="키워드를 입력하세요&#10;줄바꿈 또는 쉼표로 구분&#10;&#10;예시:&#10;골프용품&#10;테니스&#10;스포츠의류"></textarea>
        <div class="hint">키워드당 최대 20개 광고주를 수집합니다</div>
      </div>

      <div class="field">
        <label>세션 이름</label>
        <input id="session-name" type="text" placeholder="스포츠업체_2024">
      </div>

      <div class="row">
        <div class="field">
          <label>동시 크롤링</label>
          <select id="concurrency">
            <option value="2">2개 (안전)</option>
            <option value="3" selected>3개 (기본)</option>
            <option value="5">5개 (빠름)</option>
          </select>
        </div>
      </div>

      <button class="btn btn-primary" id="start-btn" onclick="startScrape()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg>
        수집 시작
      </button>
    </div>

    <!-- 진행상황 -->
    <div class="card" id="progress-section">
      <div class="progress-header">
        <h2 style="margin:0">진행상황</h2>
        <button class="btn btn-danger" onclick="stopScrape()">중단</button>
      </div>
      <span id="phase-badge">광고 수집 중</span>
      <div class="progress-bar-wrap"><div id="progress-bar"></div></div>
      <div id="current-item">준비 중...</div>
      <div id="log"></div>
    </div>
  </div>

  <!-- 오른쪽: 결과 패널 -->
  <div>
    <!-- 세션 목록 -->
    <div class="card" style="margin-bottom:16px">
      <h2>수집 세션</h2>
      <div class="session-list" id="session-list">
        <div class="empty">수집 기록이 없습니다</div>
      </div>
      <button class="btn btn-ghost" onclick="loadSessions()" style="width:auto;padding:8px 16px;font-size:13px">
        새로고침
      </button>
    </div>

    <!-- 이메일 결과 -->
    <div class="card">
      <div class="stats-grid" id="stats-grid" style="display:none">
        <div class="stat-card"><div class="num" id="stat-total">0</div><div class="lbl">광고주</div></div>
        <div class="stat-card"><div class="num" id="stat-with-email">0</div><div class="lbl">이메일 보유</div></div>
        <div class="stat-card"><div class="num" id="stat-emails">0</div><div class="lbl">고유 이메일</div></div>
      </div>

      <div class="export-bar">
        <h2 style="margin:0">수집된 이메일</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <span id="result-count"></span>
          <button class="btn btn-ghost" id="export-btn" onclick="exportCsv()" style="padding:8px 14px;font-size:13px" disabled>
            ⬇ CSV 다운로드
          </button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>이메일</th>
              <th>회사명</th>
              <th>키워드</th>
              <th>전화번호</th>
              <th>수집일시</th>
            </tr>
          </thead>
          <tbody id="email-table">
            <tr><td colspan="5" class="empty">세션을 선택하면 결과를 확인할 수 있습니다</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script>
  let es = null;
  let selectedSessionId = null;

  // ── SSE 연결 ─────────────────────────────────────────────────────
  function connectSSE() {
    es = new EventSource('/events');

    es.addEventListener('connected', () => addLog('서버 연결됨', 'info'));

    es.addEventListener('start', e => {
      const d = JSON.parse(e.data);
      addLog(`수집 시작: ${d.keywords.join(', ')}`, 'info');
      document.getElementById('progress-section').style.display = 'block';
    });

    es.addEventListener('progress', e => {
      const d = JSON.parse(e.data);
      document.getElementById('progress-bar').style.width = d.pct + '%';

      const phaseLabel = d.phase === 'scrape' ? '광고 수집' : '이메일 크롤링';
      document.getElementById('phase-badge').textContent = `${phaseLabel} ${d.pct}%`;
      document.getElementById('current-item').textContent = d.item;

      if (d.found > 0) {
        addLog(`${d.item.split('/').slice(-1)[0]} → ${d.found}개`, d.phase === 'crawl' ? 'found' : 'info');
      }
    });

    es.addEventListener('done', e => {
      const d = JSON.parse(e.data);
      addLog(`✓ 완료! 광고주 ${d.stats.totalAdvertisers}개 | 이메일 ${d.stats.uniqueEmails}개`, 'done');
      document.getElementById('start-btn').disabled = false;
      document.getElementById('start-btn').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg> 수집 시작';
      loadSessions();
      if (d.sessionId) loadEmails(d.sessionId);
    });

    es.addEventListener('stopped', () => {
      addLog('수집 중단됨', 'error');
      document.getElementById('start-btn').disabled = false;
    });

    es.addEventListener('error', e => {
      if (e.data) addLog('오류: ' + JSON.parse(e.data).message, 'error');
    });
  }

  // ── 수집 시작 ────────────────────────────────────────────────────
  async function startScrape() {
    const keywords = document.getElementById('keywords').value.trim();
    if (!keywords) { alert('키워드를 입력하세요'); return; }

    document.getElementById('start-btn').disabled = true;
    document.getElementById('start-btn').innerHTML = '수집 중...';
    document.getElementById('log').innerHTML = '';
    document.getElementById('progress-bar').style.width = '0%';

    await fetch('/api/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        keywords,
        sessionName: document.getElementById('session-name').value || null,
        concurrency: document.getElementById('concurrency').value,
      }),
    }).then(r => r.json()).then(d => {
      if (d.error) { alert(d.error); document.getElementById('start-btn').disabled = false; }
    });
  }

  // ── 수집 중단 ────────────────────────────────────────────────────
  async function stopScrape() {
    await fetch('/api/stop', { method: 'POST' });
    document.getElementById('start-btn').disabled = false;
    document.getElementById('start-btn').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M5 3l14 9-14 9V3z"/></svg> 수집 시작';
  }

  // ── 세션 목록 ────────────────────────────────────────────────────
  async function loadSessions() {
    const sessions = await fetch('/api/sessions').then(r => r.json());
    const container = document.getElementById('session-list');

    if (!sessions.length) {
      container.innerHTML = '<div class="empty">수집 기록이 없습니다</div>';
      return;
    }

    container.innerHTML = sessions.map(s => `
      <div class="session-item ${s.id === selectedSessionId ? 'active' : ''}" onclick="loadEmails(${s.id})">
        <div>
          <div class="session-name">${s.name}</div>
          <div class="session-meta">${s.created_at}</div>
        </div>
        <span class="session-status s-${s.status}">${{running:'진행중', done:'완료', error:'오류'}[s.status] || s.status}</span>
      </div>
    `).join('');
  }

  // ── 이메일 결과 조회 ─────────────────────────────────────────────
  async function loadEmails(sessionId) {
    selectedSessionId = sessionId;
    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
    event?.target?.closest('.session-item')?.classList.add('active');

    const { emails, stats } = await fetch(`/api/emails?sessionId=${sessionId}`).then(r => r.json());

    // 통계
    if (stats) {
      document.getElementById('stats-grid').style.display = 'grid';
      document.getElementById('stat-total').textContent = stats.totalAdvertisers;
      document.getElementById('stat-with-email').textContent = stats.withEmail;
      document.getElementById('stat-emails').textContent = stats.uniqueEmails;
    }

    // 테이블
    const tbody = document.getElementById('email-table');
    if (!emails.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">수집된 이메일이 없습니다</td></tr>';
    } else {
      tbody.innerHTML = emails.map(e => `
        <tr>
          <td class="email-cell">${e.email}</td>
          <td>${e.company_name || '-'}</td>
          <td><span class="tag">${e.keyword}</span></td>
          <td>${e.phone || '-'}</td>
          <td>${(e.crawled_at || '').slice(0, 16)}</td>
        </tr>
      `).join('');
    }

    document.getElementById('result-count').textContent = `${emails.length}개`;
    document.getElementById('export-btn').disabled = emails.length === 0;
  }

  // ── CSV 다운로드 ─────────────────────────────────────────────────
  function exportCsv() {
    const qs = selectedSessionId ? `?sessionId=${selectedSessionId}` : '';
    window.location.href = `/api/export${qs}`;
  }

  // ── 로그 ────────────────────────────────────────────────────────
  function addLog(msg, type = 'info') {
    const log = document.getElementById('log');
    const now = new Date().toLocaleTimeString('ko-KR');
    log.innerHTML += `<div class="log-${type}">[${now}] ${msg}</div>`;
    log.scrollTop = log.scrollHeight;
  }

  // 초기화
  connectSSE();
  loadSessions();
  fetch('/api/status').then(r => r.json()).then(d => {
    if (d.running) {
      document.getElementById('start-btn').disabled = true;
      document.getElementById('progress-section').style.display = 'block';
      addLog('진행 중인 수집이 있습니다', 'info');
    }
  });
</script>
</body>
</html>
