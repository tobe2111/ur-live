name: Debug Build Failure

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    name: Debug Build Steps
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check Environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "Free memory: $(free -h)"
          echo "Disk space: $(df -h)"

      - name: Install dependencies (with output)
        run: npm ci --verbose

      - name: Check React version
        run: |
          echo "Package.json React:"
          cat package.json | grep '"react"'
          echo ""
          echo "Installed React:"
          node -p "require('./node_modules/react/package.json').version"

      - name: Run prebuild
        run: npm run prebuild

      - name: Build (with debug)
        run: |
          echo "Starting build..."
          NODE_OPTIONS='--max-old-space-size=4096' npm run build 2>&1 | tee build.log
          echo "Build exit code: $?"
        timeout-minutes: 20
        continue-on-error: true

      - name: Show build log on failure
        if: failure()
        run: |
          echo "==== BUILD FAILED ===="
          tail -100 build.log || echo "No build log found"

      - name: Check dist directory
        run: |
          if [ -d "dist" ]; then
            echo "✅ dist directory exists"
            ls -lah dist/
          else
            echo "❌ dist directory not found"
            exit 1
          fi
