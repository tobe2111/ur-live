name: Check Secrets Configuration

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    name: Verify Cloudflare Secrets
    steps:
      - name: Check CLOUDFLARE_API_TOKEN
        run: |
          if [[ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]]; then
            echo "❌ ERROR: CLOUDFLARE_API_TOKEN is not set"
            echo "Please add it in: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          else
            echo "✅ CLOUDFLARE_API_TOKEN is set (length: ${#CLOUDFLARE_API_TOKEN})"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Check CLOUDFLARE_ACCOUNT_ID
        run: |
          if [[ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]]; then
            echo "❌ ERROR: CLOUDFLARE_ACCOUNT_ID is not set"
            echo "Please add it in: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          else
            echo "✅ CLOUDFLARE_ACCOUNT_ID is set: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          fi

      - name: All Checks Passed
        run: |
          echo "✅ All required secrets are configured!"
          echo "You can now run the deploy workflow."
