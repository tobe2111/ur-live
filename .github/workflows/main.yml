name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      - name: Build project
        run: npm run build
        env:
          NODE_VERSION: 20
          VITE_REGION: KR
          VITE_DEFAULT_LANGUAGE: ko
          VITE_API_BASE_URL: https://live.ur-team.com
          VITE_FIREBASE_API_KEY: AIzaSyCxmgG3NEXsWtHKbE425dvq5EWs3WHXOh8
          VITE_FIREBASE_AUTH_DOMAIN: urteam-live-commerce-5b284.firebaseapp.com
          VITE_FIREBASE_DATABASE_URL: https://urteam-live-commerce-5b284-default-rtdb.asia-southeast1.firebasedatabase.app
          VITE_FIREBASE_PROJECT_ID: urteam-live-commerce-5b284
          VITE_FIREBASE_STORAGE_BUCKET: urteam-live-commerce-5b284.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: 352937066044
          VITE_FIREBASE_APP_ID: 1:352937066044:web:e5bfd5e1d8f61688e30d39
          VITE_FIREBASE_MEASUREMENT_ID: G-B1ST2L37CM
          VITE_KAKAO_APP_KEY: 975a2e7f97254b08f15dba4d177a2865
          VITE_KAKAO_JAVASCRIPT_KEY: 975a2e7f97254b08f15dba4d177a2865
          VITE_KAKAO_REST_API_KEY: 5dd74bccb797640b0efd070467f3bafd
          VITE_TOSS_CLIENT_KEY: live_gck_yL0qZ4G1VOdvERE6vv6oroWb2MQY
          VITE_SENTRY_DSN: https://08caf64e8e7955f09acc2b0551fdb049@o4510992097935360.ingest.us.sentry.io/4510992127295488
          VITE_SENTRY_ENVIRONMENT: production

      - name: Verify build output
        run: |
          echo "=== Build verification ==="
          test -f dist/client/index.html || (echo "❌ index.html missing" && exit 1)
          test -f dist/client/_worker.js || (echo "❌ _worker.js missing" && exit 1)
          test -d dist/client/assets || (echo "❌ assets directory missing" && exit 1)
          JS_COUNT=$(ls dist/client/assets/*.js 2>/dev/null | wc -l)
          echo "✅ index.html exists"
          echo "✅ _worker.js exists"
          echo "✅ $JS_COUNT JS chunks in assets/"
          test $JS_COUNT -gt 50 || (echo "❌ Too few JS chunks ($JS_COUNT), build may be incomplete" && exit 1)
          echo "✅ Build verification passed"

      - name: Deploy to Cloudflare Workers (live.ur-team.com)
        run: npx wrangler@3 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (ur-live.pages.dev)
        run: npx wrangler@3 pages deploy dist/client --project-name=ur-live --branch=main --commit-message="deploy from ${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy verification
        run: |
          echo "=== Post-deploy check ==="
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://ur-live.pages.dev/)
          echo "Homepage status: $STATUS"
          test "$STATUS" = "200" || (echo "⚠️ Homepage returned $STATUS" && exit 0)
          echo "✅ Deployment verified"
