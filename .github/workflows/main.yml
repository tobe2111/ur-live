name: Deploy to Cloudflare Pages

# 🛡️ 2026-05-13: push 트리거 복원 — main 으로 push 시 자동 배포.
#   2026-05-07 ~ 5-13 동안 Actions 한도 소진으로 workflow_dispatch 로 비활성화했음.
#   Workers 프로젝트의 cron 갱신은 별도 (수동 `wrangler deploy`).
on:
  push:
    branches: [main]
  workflow_dispatch:

# 🛡️ 2026-05-28: 동시 배포 1개만 — 새 push 시 진행 중 배포 취소 (latest-wins).
#   이전: concurrency 없음 → 빠른 연속 push 마다 deploy 누적 (한 번 hang 시 10+ 개 동시 In progress).
concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    # 🛡️ 2026-05-28: 무한 hang 방어 — step 행 시 30분 후 실패 처리 (prerender hang 사고 재발 방지).
    timeout-minutes: 30
    # 🛡️ 2026-04-22 배치 117 (TD-012): Node 20 runtime deprecation 대비.
    #   2026-09 부터 GHA 의 JS actions 는 Node 24 사용. 일부 actions 는 아직
    #   Node 20 을 지정 — 이 env 가 Node 24 로 강제 실행.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 🏭 2026-06-05: 전체 히스토리 — 앱 버전(v1.0.<커밋수>)을 vite 빌드에서 계산하려면 필요.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      # 🛡️ 2026-04-22: 평문 키 → GitHub Secrets fallback.
      # 클라이언트 번들에 주입되는 VITE_* 는 본질적으로 공개 (브라우저 네트워크탭에서 보임)지만,
      # workflow 파일에 평문으로 두면 (1) git history 영구 노출, (2) 키 회전 시 코드 변경 필요.
      # Secret 으로 옮기면 회전이 Dashboard 작업만으로 가능. fallback 으로 기존 default 유지.
      - name: Build project
        run: npm run build
        env:
          NODE_VERSION: 20
          VITE_REGION: KR
          VITE_DEFAULT_LANGUAGE: ko
          VITE_API_BASE_URL: https://live.ur-team.com
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || 'AIzaSyCxmgG3NEXsWtHKbE425dvq5EWs3WHXOh8' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'urteam-live-commerce-5b284.firebaseapp.com' }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL || 'https://urteam-live-commerce-5b284-default-rtdb.asia-southeast1.firebasedatabase.app' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || 'urteam-live-commerce-5b284' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'urteam-live-commerce-5b284.firebasestorage.app' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '352937066044' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '1:352937066044:web:e5bfd5e1d8f61688e30d39' }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || 'G-B1ST2L37CM' }}
          VITE_KAKAO_APP_KEY: ${{ secrets.VITE_KAKAO_APP_KEY || '975a2e7f97254b08f15dba4d177a2865' }}
          VITE_KAKAO_JAVASCRIPT_KEY: ${{ secrets.VITE_KAKAO_JAVASCRIPT_KEY || '975a2e7f97254b08f15dba4d177a2865' }}
          # KAKAO_REST_API_KEY 는 서버 전용 (wrangler secret). 클라이언트 번들 금지.
          VITE_TOSS_CLIENT_KEY: ${{ secrets.VITE_TOSS_CLIENT_KEY || 'live_gck_yL0qZ4G1VOdvERE6vv6oroWb2MQY' }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN || 'https://08caf64e8e7955f09acc2b0551fdb049@o4510992097935360.ingest.us.sentry.io/4510992127295488' }}
          VITE_SENTRY_ENVIRONMENT: production
          # 🛡️ 2026-04-27: Sentry release 와 source map upload 의 release 이름 통일.
          #   sentry.ts 의 `release: webapp@VITE_APP_VERSION` ↔ GitHub Actions 의 `releases new $GITHUB_SHA`
          #   둘이 일치해야 Sentry 가 source map 을 매칭함.
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Verify build output
        run: |
          echo "=== Build verification ==="
          test -f dist/client/index.html || (echo "❌ index.html missing" && exit 1)
          test -f dist/client/_worker.js || (echo "❌ _worker.js missing" && exit 1)
          test -d dist/client/assets || (echo "❌ assets directory missing" && exit 1)
          JS_COUNT=$(ls dist/client/assets/*.js 2>/dev/null | wc -l)
          echo "✅ index.html exists"
          echo "✅ _worker.js exists"
          echo "✅ $JS_COUNT JS chunks in assets/"
          test $JS_COUNT -gt 50 || (echo "❌ Too few JS chunks ($JS_COUNT), build may be incomplete" && exit 1)

          # 🛡️ Bundle size budget (2026-04-22 추가)
          # 번들 비대로 인한 초기 로딩 지연 방지.
          # 한계: _worker.js 4MB (2026-05-18 상향 from 3MB — 숙소/정산/referral 코드 추가로 임계 근처).
          #       초기 entry JS 500KB, 총 client 50MB.
          # 참고: Cloudflare Workers Free plan 한도 1MB compressed (≈4MB uncompressed).
          #       Paid plan 10MB uncompressed 까지 가능.
          WORKER_SIZE=$(stat -c%s dist/client/_worker.js 2>/dev/null || stat -f%z dist/client/_worker.js)
          echo "  _worker.js size: $(($WORKER_SIZE / 1024))KB"
          test $WORKER_SIZE -lt 4194304 || (echo "❌ _worker.js 너무 큼 ($(($WORKER_SIZE/1024))KB > 4MB)" && exit 1)

          ENTRY_SIZE=$(du -b dist/client/assets/index-*.js 2>/dev/null | head -1 | awk '{print $1}' || echo 0)
          echo "  entry JS size: $(($ENTRY_SIZE / 1024))KB"
          test $ENTRY_SIZE -lt 524288 || (echo "⚠️ entry JS 비대 ($(($ENTRY_SIZE/1024))KB > 500KB) — 코드 스플리팅 점검 권장"; true)

          CLIENT_TOTAL=$(du -sb dist/client 2>/dev/null | awk '{print $1}')
          echo "  total client size: $(($CLIENT_TOTAL / 1024 / 1024))MB"
          test $CLIENT_TOTAL -lt 52428800 || (echo "❌ client 총 용량 초과 ($(($CLIENT_TOTAL/1024/1024))MB > 50MB)" && exit 1)

          echo "✅ Build verification + size budget 통과"

      # 🛡️ 2026-05-22 영구 deploy fix:
      #   build 가 `sourcemap: 'hidden'` 생성 → 270+ .map 파일 (총 ~590 files).
      #   Cloudflare Pages Direct Upload 가 96/592 에서 일관되게 500 거부 (rate/size).
      #   기존: Sentry 업로드 step 안에서만 .map 삭제 → SENTRY_AUTH_TOKEN 없으면 그대로 잔존.
      #   해결: deploy 직전 무조건 .map 삭제 (Sentry 가 이미 업로드했든 안 했든 무관).
      #   .map 은 hidden 모드라 JS 에 reference 주석 없음 — 삭제해도 런타임 영향 0.
      - name: Strip source maps before deploy (CF Pages 파일 수 절감)
        run: |
          MAPS_BEFORE=$(find dist/client -name '*.map' 2>/dev/null | wc -l)
          find dist/client -name '*.map' -delete 2>/dev/null || true
          MAPS_AFTER=$(find dist/client -name '*.map' 2>/dev/null | wc -l)
          TOTAL_FILES=$(find dist/client -type f 2>/dev/null | wc -l)
          echo "✅ Stripped $MAPS_BEFORE source maps ($MAPS_AFTER remaining). Total deploy files: $TOTAL_FILES"

      # 🛡️ 2026-04-26 (O1): Sentry 소스맵 업로드
      # vite.config.ts 의 sourcemap: 'hidden' 으로 .map 파일이 dist/client/assets/ 에 생성됨.
      # @sentry/cli 로 release 별 소스맵 업로드 → production 에러 stack trace 가독성 ↑.
      # SENTRY_AUTH_TOKEN 미설정이면 graceful skip.
      - name: Upload Sentry source maps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG || 'ur-live' }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT || 'ur-live-frontend' }}
        run: |
          # sentry-cli 1회 사용 — 의존성 추가 안 함
          curl -sL https://sentry.io/get-cli/ | bash
          # 🛡️ 2026-04-27: sentry.ts 의 `release: webapp@${VITE_APP_VERSION}` 형식과 일치.
          export RELEASE="webapp@${{ github.sha }}"
          ~/.local/bin/sentry-cli releases new "$RELEASE" || true
          ~/.local/bin/sentry-cli releases files "$RELEASE" upload-sourcemaps \
            dist/client/assets \
            --url-prefix '~/assets' \
            --rewrite || true
          ~/.local/bin/sentry-cli releases finalize "$RELEASE" || true
          # 🛡️ 2026-04-27: deployment 마킹 (Sentry 가 어느 release 가 production 에 deploy 됐는지 추적)
          ~/.local/bin/sentry-cli releases deploys "$RELEASE" new -e production || true
          # 보안: 소스맵 파일은 R2/CDN 에 노출되지 않도록 삭제 (hidden 모드라 자동으로 노출 X 지만 방어)
          find dist/client/assets -name '*.map' -delete
          echo "✅ Sentry source maps uploaded for release $RELEASE"

      # 2026-04-22: Workers 프로젝트 제거 — 이 프로젝트는 Pages (with _worker.js) 구조.
      # 사용자가 이미 Pages(ur-live.pages.dev)에 모든 secret(JWT_SECRET 등)을 세팅함.
      # `live.ur-team.com` Custom Domain을 Workers → Pages로 이동 (사용자 Dashboard 작업).
      # 이후 이 Action은 Pages에만 배포하고 production promote도 즉시 수행.

      # 🛡️ 2026-05-22 사고 fix: wrangler@4 (4.84.1) 가 CF API 응답을 malformed 로 받는 known 회귀.
      #   에러 패턴: "Received a malformed response from the API" + "POST /pages/assets/upload -> 500"
      #   CLAUDE.md 권장: wrangler@3 (3.x 안정) 사용. 사용자 main deploy 매 commit 실패 영구 해결.
      #   재시도 로직 추가: transient 실패 시 최대 3회 (exponential backoff).
      - name: Deploy to Cloudflare Pages
        run: |
          set -e
          MAX_RETRY=3
          for i in $(seq 1 $MAX_RETRY); do
            echo "=== Deploy attempt $i/$MAX_RETRY ==="
            if npx wrangler@3 pages deploy dist/client \
                --project-name=ur-live \
                --branch=main \
                --commit-dirty=true \
                --commit-message="deploy ${{ github.sha }}"; then
              echo "✅ Deploy succeeded on attempt $i"
              exit 0
            fi
            if [ $i -lt $MAX_RETRY ]; then
              SLEEP=$((i * 10))
              echo "⚠️ Attempt $i failed. Sleeping ${SLEEP}s before retry..."
              sleep $SLEEP
            fi
          done
          echo "❌ All $MAX_RETRY deploy attempts failed."
          exit 1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 🛡️ 2026-06-10 (드리프트 창 제거): 배포 직후 스키마 자동 동기화 — '코드 먼저, 스키마는 수동 대기'
      #   가 no-such-column 류 '없던 에러'의 구조적 원인이었음. REPAIR_SCHEMA_TOKEN 미설정 시 skip(안내만).
      #   설정: 같은 값을 ① Cloudflare Pages Variables ② GitHub repo Secrets 양쪽에 등록.
      - name: Auto schema repair after deploy
        run: |
          if [ -z "${{ secrets.REPAIR_SCHEMA_TOKEN }}" ]; then
            echo "::notice::REPAIR_SCHEMA_TOKEN 미설정 — 스키마 자동복구 skip (Cloudflare+GitHub 양쪽에 같은 값 등록 시 활성화)"
            exit 0
          fi
          sleep 10
          RES=$(curl -s --max-time 60 -X POST "https://live.ur-team.com/api/_internal/repair-schema/auto" \
            -H "X-Repair-Token: ${{ secrets.REPAIR_SCHEMA_TOKEN }}" || echo '{}')
          echo "repair-schema 응답: $RES"
          if echo "$RES" | grep -q '"success":true'; then
            ERRS=$(echo "$RES" | python3 -c "import sys,json;print(json.load(sys.stdin).get('errors',0))" 2>/dev/null || echo "?")
            echo "✅ 스키마 자동복구 완료 (오류 $ERRS건)"
            echo "$RES" | grep -q '컬럼.*임박' && echo "::warning::넓은 테이블 컬럼 한도 임박 — column_warnings 확인" || true
          else
            echo "::warning::스키마 자동복구 실패 — /admin/health 에서 수동 실행 필요"
          fi

      - name: Post-deploy verification (smoke test)
        # 🛡️ 2026-04-22 강화: 주요 엔드포인트가 "응답은 한다"는 것만 확인.
        # worker 자체가 부팅 실패면 5xx 또는 타임아웃. 2xx/3xx/4xx는 worker 살아있음.
        # CRITICAL: 5xx 응답 있으면 workflow FAIL → 빠른 revert 신호.
        run: |
          echo "=== Post-deploy smoke test ==="
          sleep 15

          PROD=https://live.ur-team.com
          FAIL=0
          FAIL_DETAILS=""

          check() {
            local path="$1"
            local label="$2"
            local status
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$PROD$path" || echo "000")
            # 5xx (worker crash) 또는 000 (timeout/DNS fail)만 실패 처리
            if [ "$status" -ge 500 ] 2>/dev/null || [ "$status" = "000" ]; then
              echo "❌ $label ($path) → $status"
              FAIL=$((FAIL + 1))
              FAIL_DETAILS="$FAIL_DETAILS\n  - $label ($path): $status"
            else
              echo "✅ $label ($path) → $status"
            fi
          }

          check "/"               "Homepage"
          check "/api/health"     "Health API"
          check "/api/version"    "Version API"
          check "/manifest.webmanifest" "PWA manifest"
          check "/api/seller/login" "Seller login"
          check "/api/admin/login"  "Admin login"
          check "/api/agency/login" "Agency login"
          # 2026-05-23: 결제 핵심 endpoint smoke
          check "/checkout"       "Checkout page"
          check "/api/payments/client-key" "Payments client-key"
          check "/toss-debug"     "Toss debug page"

          # 🛡️ 2026-06-10 (교환권 상세 500 사고): 데이터 의존 상세 엔드포인트 — 실제 상품 id 로 검증.
          #   list 는 멀쩡한데 detail 만 깨지는 회귀(SELECT p.* 컬럼 한도 등)는 정적 경로 체크로 못 잡음.
          GB_ID=$(curl -s --max-time 10 "$PROD/api/group-buy/products?status=active" | python3 -c "import sys,json;d=json.load(sys.stdin);items=d.get('data') or [];print(items[0]['id'] if items else '')" 2>/dev/null || echo "")
          if [ -n "$GB_ID" ]; then
            check "/api/group-buy/products/$GB_ID" "GroupBuy/교환권 detail (id=$GB_ID)"
          else
            echo "⚠️ 활성 공구 없음 — 공구 상세 smoke skip"
          fi
          P_ID=$(curl -s --max-time 10 "$PROD/api/products?limit=1" | python3 -c "import sys,json;d=json.load(sys.stdin);items=(d.get('data') or {}).get('products') or d.get('data') or d.get('products') or [];print(items[0]['id'] if isinstance(items,list) and items else '')" 2>/dev/null || echo "")
          if [ -n "$P_ID" ]; then
            check "/api/products/$P_ID" "Product detail (id=$P_ID)"
          else
            echo "⚠️ 상품 목록 파싱 실패 — 상품 상세 smoke skip"
          fi
          check "/api/wholesale/mall" "Wholesale mall info"

          # 결제 healthcheck — 503 (env mismatch) 은 fail 처리 안 함, 별도 curl + 본문 파싱.
          PAY_HEALTH=$(curl -s --max-time 10 "$PROD/api/_healthcheck/payments" || echo '{}')
          if echo "$PAY_HEALTH" | grep -q '"healthy":false'; then
            echo ""
            echo "::warning::결제 healthcheck unhealthy — 운영자 액션 필요"
            echo "응답: $PAY_HEALTH"
            echo ""
            echo "조치: Cloudflare Dashboard → Pages → ur-live → Settings"
            echo "      → Environment variables and secrets → Production tab"
            echo "      → /admin/env-check 에서 정확한 issue 확인 가능"
          elif echo "$PAY_HEALTH" | grep -q '"healthy":true'; then
            echo "OK 결제 healthcheck"
          else
            echo "::warning::결제 healthcheck endpoint 응답 비정상, 통과"
          fi

          if [ "$FAIL" -gt 0 ]; then
            echo ""
            echo "❌ Smoke test: $FAIL 엔드포인트에서 5xx/타임아웃 (worker crash 가능성):"
            echo -e "$FAIL_DETAILS"
            echo ""
            echo "원인 파악: https://dash.cloudflare.com → ur-live → Logs → Live log"
            exit 1
          fi
          echo "✅ All smoke tests passed (worker 정상 응답 중)"
