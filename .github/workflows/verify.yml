name: PR Verification

# PR 단위 빠른 검증 — 빌드 + 정적 분석 + 번들 예산 체크.
# 배포는 main.yml 이 담당하므로 여기는 검증만.
#
# 🛡️ 2026-05-13: push trigger 복원 (public repo 라 Actions 무제한 무료).
#   pre-commit hook 우회 (-n) 해도 PR 에서 반드시 통과해야 main 머지 가능.
on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]   # main push 는 main.yml 이 처리
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    name: Verify
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 1. 영구 안티패턴 검사 (사고 재발 방지) ──
      - name: Hono v4 라우터 안티패턴 (wildcard cors)
        run: |
          # 모든 features/*.routes.ts 검사 — 2026-05-12/13 405 사고 패턴
          violations=$(grep -rnE "\.use\s*\(\s*['\"]\*['\"][^)]*cors\s*\(" \
            src/features/ --include='*.routes.ts' 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "❌ Wildcard cors() 발견 — 405 사고 재발 위험:"
            echo "$violations"
            echo "해결: worker/index.ts:244 글로벌 cors 가 처리. sub-router cors() 제거."
            exit 1
          fi
          echo "✅ 라우터 안티패턴 없음"

      - name: "'vite build' 단독 사용 차단"
        run: |
          # 검사 대상: scripts/ 내 실제 실행 가능한 sh / ps1 / mjs / cjs / js / ts
          # 제외: 문서 (md), 검사 스크립트 자체, install-hooks 의 에러메시지, workflow yml
          EXCLUDE='check-build-command\.sh|install-git-hooks\.sh|\.github/workflows/'
          violations=$(find scripts -type f \( -name '*.sh' -o -name '*.ps1' -o -name '*.mjs' -o -name '*.cjs' -o -name '*.js' -o -name '*.ts' \) 2>/dev/null \
            | grep -vE "$EXCLUDE" \
            | xargs grep -nE "(^|[^a-zA-Z_:-])(npx +)?vite +build([^a-zA-Z_]|$)" 2>/dev/null \
            | grep -v "npm run build" \
            | grep -v "build:client" \
            | grep -vE "^[^:]*:[0-9]*:[[:space:]]*[#/]" \
            | grep -vE 'echo .*vite build|console\.|# ' \
            || true)
          if [ -n "$violations" ]; then
            echo "❌ 'vite build' 단독 사용 — _worker.js 미갱신 사고 패턴:"
            echo "$violations"
            echo ""
            echo "  🔧 해결: 'npm run build' 사용 (client + worker + prepare 전체)"
            exit 1
          fi
          echo "✅ 빌드 명령 안전"

      - name: Hardcoded secret 검출
        run: |
          # 실제 secret (AWS / Stripe) 만 검출. PEM 마커는 false-positive 많아서 제외:
          #   - firebase-admin.ts 등이 env PEM 파싱하기 위해 string literal 로 사용
          #   - 실제 PEM 키 body 가 commit 됐는지 검증하려면 multi-line 분석 필요
          violations=""
          for f in $(find src/ -type f \( -name "*.ts" -o -name "*.tsx" \) | grep -vE "\.test\.|\.spec\.|/tests/|/__tests__/"); do
            # Stripe live key (sk_live_ + 20+ char) — 정규식/검증 코드 제외
            m=$(grep -nE "sk_live_[A-Za-z0-9]{20,}" "$f" 2>/dev/null \
              | grep -vE "regex|\.test\(|\.match\(|\.includes\(|\.replace\(|// |/\\*" \
              || true)
            [ -n "$m" ] && violations="$violations\n[$f] Stripe live secret:\n$m"

            # AWS access key
            m=$(grep -nE "AKIA[0-9A-Z]{16}" "$f" 2>/dev/null \
              | grep -vE "// |/\\*" \
              || true)
            [ -n "$m" ] && violations="$violations\n[$f] AWS access key:\n$m"

            # 실제 PEM key body (BEGIN + base64 + END 의 multi-line 블록)
            # awk 로 BEGIN ~ END 사이에 base64 문자열 있는지 확인
            m=$(awk '
              /BEGIN (RSA )?PRIVATE KEY/ {found_begin=NR; key_body=""}
              found_begin && /^[A-Za-z0-9+\/=]{20,}$/ {key_body=$0}
              found_begin && /END (RSA )?PRIVATE KEY/ {
                if (key_body) print FILENAME":"found_begin": (actual PEM key body detected)"
                found_begin=0
              }
            ' "$f" 2>/dev/null || true)
            [ -n "$m" ] && violations="$violations\n$m"
          done
          if [ -n "$violations" ]; then
            echo "❌ Secret 누출 의심 — public repo 영구 노출 위험:"
            echo -e "$violations"
            exit 1
          fi
          echo "✅ Secret 없음"

      # 🛡️ 2026-06-22: npm audit high/critical 게이트 — production 트리에 미허용 high/critical
      #   유입 차단. .audit-allowlist.json 에 등재된 GHSA(dev/빌드툴 전용·도달불가)만 제외.
      #   pre-commit 에만 있고 CI 부재라 high 2건(form-data/@grpc) 슬립했던 것 재발 방지.
      - name: npm audit (high/critical gate)
        run: bash scripts/check-npm-audit.sh
        continue-on-error: false

      # ── 2. 정적 검사 (빠름, 의존성 없음) ──
      - name: Schema references check
        run: bash scripts/check-schema-refs.sh
        continue-on-error: false

      # 🛡️ 2026-06-10: products star-select 차단 — D1 결과셋 컬럼 한도(100) 초과로
      #   교환권/공구 상세 전체 500 났던 사고 재발 방지. strict.
      - name: No SELECT * on products
        run: bash scripts/check-no-select-star-products.sh
        continue-on-error: false

      # 🛡️ 2026-06-10: products 컬럼 예산제 — 새 ALTER 는 baseline 등록(의식적 결정) 또는
      #   product_supply_meta 사이드테이블 사용 강제. god-table 증식 차단.
      - name: Products column budget
        run: node scripts/check-products-column-budget.mjs
        continue-on-error: false

      # 🛡️ 2026-06-10 (전수조사): PRODUCT_DETAIL_FIELDS 의 모든 컬럼이 프로덕션에서 복구 가능
      #   (base CREATE TABLE ∪ repair-schema ALTER) 함을 강제 — 'no such column' 상세 500 의
      #   구조적 차단 (자가치유 prune 은 응급, 이 검사가 수렴 보장). strict.
      - name: Product detail fields repairable
        run: node scripts/check-product-detail-fields-repairable.mjs
        continue-on-error: false

      - name: API auth check
        run: bash scripts/check-api-auth.sh
        # 기존 워닝 있어 fail 하지 않음
        continue-on-error: true

      - name: Guide sync check
        run: bash scripts/check-guide-sync.sh
        continue-on-error: true

      - name: Naming conflicts
        run: bash scripts/check-naming-conflicts.sh
        continue-on-error: true

      # 🛡️ 2026-05-31: 다크/라이트 테마 일관성 — 유저 대면 화이트-토글 페이지의
      #   라이트 색상(bg-white/text-gray-900 등)에 dark: variant 누락 검출.
      #   기존 backlog(공유 컴포넌트 다수) 존재 → warn-only. backlog 정리 후 STRICT_THEME=1 승격 예정.
      # 🛡️ 2026-06-10: 백로그 0 달성 → strict 승격 (2026-05-31 예고대로). 위반 = 머지 차단.
      - name: Dark/Light theme consistency (strict)
        run: node scripts/check-theme-consistency.mjs
        env:
          STRICT_THEME: '1'
        continue-on-error: false

      # 🍎 2026-06-20: 카카오 OAuth iOS 쿠키 미영속 안티패턴 (strict). iOS Safari/WebKit 은
      #   cross-site 콜백 302 Set-Cookie 미영속 → 역할토큰 transfer 쿠키(ur_pending_*)/세션 302 의존 시
      #   iOS 만 조용히 깨짐(Chrome 정상). 역할토큰=fragment(pending-auth.ts), 세션=establish.
      #   우회: 커밋 메시지 [SKIP_AUTH_COOKIE_CHECK]. 규칙: CLAUDE.md '🍎 iOS 쿠키 영속 룰'.
      - name: Kakao OAuth iOS cookie pattern (strict)
        run: bash scripts/check-auth-cookie-pattern.sh
        env:
          STRICT_AUTH_COOKIE: '1'
        continue-on-error: false

      # 🛡️ 2026-06-17: React Query "stale initialData" 버그 클래스 방어.
      #   useQuery/useApiQuery 의 initialData(localStorage/SSR seed)가 initialDataUpdatedAt 또는
      #   refetchOnMount:'always' 없이 fresh 로 간주돼 cold mount 에서 refetch 안 되던 사고
      #   (잔액 '딜 부족' 오표시) 재발 방지. 현재 위반 0 → strict.
      - name: React Query initialData freshness guard (strict)
        run: node scripts/check-query-initialdata.mjs -s
        continue-on-error: false

      # 🛡️ 2026-06-17: 듀얼 로그인(소비자↔대시보드) 재발 방지 — 현재 위반 0 → strict.
      #   localStorage user_type === 'user' 로그인 게이트(세션 풀림 사고 근본원인) 신규 추가 차단.
      - name: Dual-login regression guard (strict)
        run: STRICT_DUAL_LOGIN=1 node scripts/check-dual-login-guard.mjs
        continue-on-error: false

      # 🛡️ 2026-06-18: group_buy_status 로 상품 종류 판별/라우팅 금지 — 현재 위반 0 → strict.
      #   group_buy_status 는 모든 상품 DEFAULT 'active' 라 종류 판별에 쓰면 쇼핑 상품이 교환권으로
      #   오분류(핀 /group-buy 오라우팅 사고). 종류는 deal_only + isVoucherCategory SSOT 만.
      - name: group_buy_status classify guard (strict)
        run: node scripts/check-groupbuy-status-classify.mjs -s
        continue-on-error: false

      # 🧭 2026-06-24: 도매(wholesale) 권한 어드민이 보는 화면의 /admin 링크가 그 역할 RBAC 로 도달
      #   불가하면 클릭 시 wholesale-overview 로 바운스(="안 넘어가요") — 슈퍼 어드민엔 안 보이는 역할-한정
      #   버그. 대표 신고("상품 승인 클릭해도 안 넘어감") 후 전체 도매 화면 정적 검사로 클래스 고정.
      - name: Wholesale admin nav reachability (strict)
        run: STRICT_NAV_REACH=1 node scripts/check-wholesale-admin-nav-reachability.mjs
        continue-on-error: false

      # 🔗 2026-06-24: 내부 링크 도달성 — 정의되지 않은 라우트로 가는 <Link>/navigate/href 를 빌드 때 차단.
      #   "클릭해도 NotFound" 죽은 링크는 모든 역할·화면에서 발생 가능하고 슈퍼/소유자 테스트로는 잘 안 보임.
      #   대표 요청("애초에 없도록 / 다른 사람이 썼을 때도") → 전 앱 정적 검사로 클래스 고정. 현재 위반 0.
      - name: Internal link reachability (strict)
        run: STRICT_LINKS=1 node scripts/check-internal-links.mjs
        continue-on-error: false

      # 🔐 2026-06-24: 도매 어드민이 도달하는 화면이 호출하는 /api/admin 경로가 wholesale RBAC 스코프
      #   안인지 단언. 카운트는 in-scope 로 세는데 목적지 데이터는 out-of-scope(403)면 "대시보드엔 N명,
      #   클릭하면 0명" 미스매치(대표 신고). 슈퍼 어드민엔 안 보임. 현재 위반 0.
      - name: Wholesale admin API scope (strict)
        run: STRICT_API_SCOPE=1 node scripts/check-wholesale-admin-api-scope.mjs
        continue-on-error: false

      # 🔀 2026-06-24: 교차-역할 API 호출 차단 — 한 대시보드(제조사/에이전시/판매사/어드민)가 다른 역할
      #   전용 토큰-게이트 네임스페이스를 부르면 그 역할 사용자에겐 403 → 먹통(소유자=슈퍼는 안 보임).
      #   대표 "다른 사람들이 썼을 때도/전역". 현재 위반 0.
      - name: Dashboard cross-role API (strict)
        run: STRICT_CROSSROLE=1 node scripts/check-dashboard-api-crossrole.mjs
        continue-on-error: false

      # 🛡️ 2026-06-20: 로그인/가입 입력 글자 흰색(다크모드) 재발 방지 — 현재 위반 0 → strict.
      #   standalone 라이트 auth 페이지가 force-light-theme/레이아웃 없이 input 렌더 시 다크모드 글자
      #   안 보임 사고(전역 .dark input 규칙이 text-gray-900 을 특이도로 이김) 신규 추가 차단.
      - name: Light-input visibility guard (strict)
        run: STRICT_LIGHT_INPUT=1 node scripts/check-light-input-guard.mjs
        continue-on-error: false

      # 🛡️ 2026-06-26: 모달/시트가 하단 네비 뒤로 가려짐 재발 방지 (대표 "계속 발생 — 근본적으로").
      #   풀스크린 오버레이(fixed inset-0 z-[N])가 네비(9999)보다 낮은 z 면 네비가 덮음. 현재 위반 0 → strict.
      #   표준: 모달 10500 / 시트 10600 (src/constants/z-index.ts). 예외는 `modal-zindex-ok` 주석.
      - name: Modal/sheet z-index above nav (strict)
        run: STRICT_MODAL_Z=1 node scripts/check-modal-zindex.mjs
        continue-on-error: false

      # 🛡️ 2026-05-17: CHECK 제약 위반 — admin live-monitor delete 500 사고 재발 방지.
      #   리터럴 'UPDATE <t> SET <c> = ...' 패턴이 마이그레이션의 CHECK(IN (...)) 허용값과
      #   불일치하면 보고. SQL 실행 시 SqlError → 500. strict 모드.
      - name: CHECK constraint violations
        run: node scripts/check-status-constraints.mjs -s

      # 🛡️ 2026-05-17: SQL bind param mismatch — 'wrong number of bindings' SqlError 방지.
      #   prepare(...).bind(...) 쌍의 ? 개수와 인자 개수가 일치하는지 검증.
      - name: SQL bind param mismatch
        run: node scripts/check-sql-bind-params.mjs -s

      # 🛡️ 2026-05-17: NOT NULL INSERT — 'NOT NULL constraint failed' 방지.
      #   INSERT 시 마이그레이션의 NOT NULL (no DEFAULT) 컬럼이 빠졌는지 검증.
      #   현재 잔여 5건 unclear (product_reviews/settlements/live_streams) — strict 보류, warn-only.
      - name: NOT NULL INSERT (warn)
        run: node scripts/check-sql-not-null-insert.mjs
        continue-on-error: true

      # 🛡️ 2026-05-17: 존재하지 않는 컬럼 참조 — 'no such column' SqlError 방지.
      #   INSERT/UPDATE 컬럼이 마이그레이션 + 런타임 inline DDL 의 스키마에 있는지 검증.
      # 🛡️ 2026-05-23: strict mode 활성화 — 23건 일괄 fix 완료 (commit bcdd8990) 후 CI 차단 가능.
      #   새 SQL 컬럼 mismatch commit 자체 차단 → "no such column" 500 사고 영구 차단.
      - name: Column existence (strict)
        run: node scripts/check-sql-column-exists.mjs -s

      # 🛡️ 2026-06-26: CSV/엑셀 수식 인젝션 재발 방지 — csvEscape 류 함수가 = + - @ 탭/CR 선행 셀을
      #   무력화 안 하면 셀러 free-text(상품명/회사명)가 =cmd.../=HYPERLINK 로 실행되던 사고. 현재 위반 0 → strict.
      - name: CSV formula-injection guard (strict)
        run: node scripts/check-csv-injection.mjs -s
        continue-on-error: false

      # 🛡️ 2026-06-26: "fetch 실패가 빈화면/₩0 으로 위장" 재발 방지 — 도매/제조사/도매-어드민 surface 의
      #   data 소비 페이지가 isError 분기 없이 렌더하면 일시 5xx 가 '데이터 0건'·'예치금 ₩0'·'승인 없음'
      #   으로 오표시(판매사 재무 오인·승인큐 self-undo). 현재 위반 0 → strict.
      - name: Query isError consumption guard (strict)
        run: node scripts/check-query-iserror.mjs -s
        continue-on-error: false

      # ── 2. 스키마 일관성 (TS interface ↔ migrations) ──
      - name: Schema verification (drift detection)
        run: node scripts/verify-schema.mjs --json
        continue-on-error: true   # drift 가 있어도 fail 하지 않음 (정보 용도)

      # ── 3. 타입 체크 ──
      - name: Type check (frontend)
        run: npx tsc --noEmit --skipLibCheck
        continue-on-error: true

      - name: Type check (worker)
        run: npx tsc --noEmit --skipLibCheck --project tsconfig.worker.json
        continue-on-error: true

      # ── 4. 빌드 ──
      - name: Build client
        env:
          # PR 검증용 더미 — production 배포 아님
          VITE_FIREBASE_API_KEY: 'pr-verify-dummy'
          VITE_FIREBASE_AUTH_DOMAIN: 'pr.example.com'
          VITE_FIREBASE_PROJECT_ID: 'pr-verify'
          VITE_FIREBASE_STORAGE_BUCKET: 'pr.example.com'
          VITE_FIREBASE_MESSAGING_SENDER_ID: '0'
          VITE_FIREBASE_APP_ID: '0'
          VITE_KAKAO_APP_KEY: 'pr-verify'
          VITE_TOSS_CLIENT_KEY: 'pr-verify'
        run: npm run build:client

      - name: Build worker
        run: npm run build:worker

      # ── 5. 번들 예산 ──
      - name: Bundle size budget
        run: npm run check:bundle:budget

      # ── 6. 결과 요약 (artifact) — build 가 성공한 경우만 ──
      - name: Bundle size report
        if: success()
        continue-on-error: true
        run: |
          npm run check:bundle 2>&1 | tee bundle-report.txt
          node scripts/check-bundle-size.mjs --json > bundle-report.json

      - name: Upload bundle artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: |
            bundle-report.txt
            bundle-report.json
          retention-days: 14
