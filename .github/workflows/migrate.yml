name: D1 Database Migration

on:
  # 수동 실행 (GitHub 웹에서 버튼 클릭으로 실행)
  workflow_dispatch:
    inputs:
      migration_file:
        description: '실행할 마이그레이션 파일 (예: migrations/0114_add_youtube_email_to_sellers.sql)'
        required: true
        default: 'migrations/0114_add_youtube_email_to_sellers.sql'

jobs:
  migrate:
    runs-on: ubuntu-latest
    name: Run D1 Migration

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migration
        run: |
          npx wrangler d1 execute toss-live-commerce-db --remote \
            --file=${{ github.event.inputs.migration_file }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify migration
        run: |
          echo "✅ Migration complete: ${{ github.event.inputs.migration_file }}"
          npx wrangler d1 execute toss-live-commerce-db --remote \
            --command="SELECT name FROM sqlite_master WHERE type='table' ORDER BY name"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
