name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Verify React Version
        run: |
          echo "🔒 Checking React version..."
          REACT_VERSION=$(node -p "require('./package.json').dependencies.react")
          echo "React version: $REACT_VERSION"
          if [[ "$REACT_VERSION" != "18.3.1" ]]; then
            echo "❌ ERROR: Expected React 18.3.1, found $REACT_VERSION"
            exit 1
          fi
          echo "✅ React version verified"

      - name: Install dependencies
        run: npm ci
      
      - name: Verify installed React
        run: |
          INSTALLED=$(node -p "require('./node_modules/react/package.json').version")
          echo "Installed React: $INSTALLED"
          if [[ "$INSTALLED" != "18.3.1" ]]; then
            echo "❌ ERROR: Wrong React version installed"
            exit 1
          fi
          echo "✅ Correct React version installed"

      - name: Build
        run: npm run build
        timeout-minutes: 15
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ur-live --branch=main --commit-dirty=true
      
      - name: Verify Deployment
        run: |
          echo "⏳ Waiting 30 seconds for deployment to propagate..."
          sleep 30
          
          echo "🔍 Checking production version..."
          PROD_VERSION=$(curl -s https://live.ur-team.com/version.json | grep -o '"version":"[^"]*"' | cut -d'"' -f4)
          LOCAL_VERSION=$(cat dist/version.json | grep -o '"version":"[^"]*"' | cut -d'"' -f4)
          
          echo "Local version:  $LOCAL_VERSION"
          echo "Production version: $PROD_VERSION"
          
          if [[ "$PROD_VERSION" == "$LOCAL_VERSION" ]]; then
            echo "✅ Deployment verified! Production is up to date."
          else
            echo "⚠️ Version mismatch detected!"
            echo "This might be due to CDN caching. Please wait a few minutes and check again."
            echo "Or manually purge Cloudflare cache."
          fi
