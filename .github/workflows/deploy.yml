name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Verify React Version (Protection Layer)
        run: |
          echo "🔒 Verifying React version before installation..."
          REACT_VERSION=$(node -p "require('./package.json').dependencies.react")
          echo "React version in package.json: $REACT_VERSION"
          if [[ "$REACT_VERSION" != "18.3.1" && "$REACT_VERSION" != "^18.3.1" ]]; then
            echo "❌ CRITICAL ERROR: Wrong React version detected!"
            echo "   Expected: 18.3.1"
            echo "   Found: $REACT_VERSION"
            echo "   This will cause forwardRef errors and white screens!"
            exit 1
          fi
          echo "✅ React version check passed"

      - name: Install dependencies
        run: npm ci
      
      - name: Verify Installed React Version (Post-Install)
        run: |
          echo "🔍 Verifying installed React version in node_modules..."
          INSTALLED_VERSION=$(node -p "require('./node_modules/react/package.json').version")
          echo "Installed React version: $INSTALLED_VERSION"
          if [[ "$INSTALLED_VERSION" != "18.3.1" ]]; then
            echo "❌ ERROR: Wrong React version installed!"
            echo "   Expected: 18.3.1"
            echo "   Installed: $INSTALLED_VERSION"
            echo "   Build will fail with forwardRef errors!"
            exit 1
          fi
          echo "✅ Post-install verification passed"
      
      - name: Check build environment
        run: |
          echo "Node version: $(node -v)"
          echo "NPM version: $(npm -v)"
          echo "Memory: $(free -h)"
          echo "Disk: $(df -h)"

      - name: Build
        id: build
        run: npm run build
        timeout-minutes: 15
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        continue-on-error: true
      
      - name: Check build status
        if: steps.build.outcome == 'failure'
        run: |
          echo "❌ Build failed. Common causes:"
          echo "  1. Out of memory (increase NODE_OPTIONS)"
          echo "  2. TypeScript errors (run 'npm run type-check' locally)"
          echo "  3. Missing dependencies (check package.json)"
          echo "  4. Build timeout (currently 15 minutes)"
          ls -lh dist/ 2>/dev/null || echo "  - dist/ folder not created"
          exit 1

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ur-live
        continue-on-error: true
      
      - name: Check deployment status
        if: steps.deploy.outcome == 'failure'
        run: |
          echo "⚠️ Cloudflare deployment failed. Check if secrets are configured:"
          echo "  - CLOUDFLARE_API_TOKEN"
          echo "  - CLOUDFLARE_ACCOUNT_ID"
          echo "Configure at: https://github.com/${{ github.repository }}/settings/secrets/actions"
          exit 1
