name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Verify React Version
        run: |
          echo "🔒 Checking React version..."
          REACT_VERSION=$(node -p "require('./package.json').dependencies.react")
          echo "React version: $REACT_VERSION"
          if [[ "$REACT_VERSION" != "18.3.1" ]]; then
            echo "❌ ERROR: Expected React 18.3.1, found $REACT_VERSION"
            exit 1
          fi
          echo "✅ React version verified"

      - name: Install dependencies
        run: npm ci
      
      - name: Verify installed React
        run: |
          INSTALLED=$(node -p "require('./node_modules/react/package.json').version")
          echo "Installed React: $INSTALLED"
          if [[ "$INSTALLED" != "18.3.1" ]]; then
            echo "❌ ERROR: Wrong React version installed"
            exit 1
          fi
          echo "✅ Correct React version installed"

      - name: Build
        run: npm run build
        timeout-minutes: 15
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ur-live --commit-dirty=true
