<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 처리 중 - 유어 라이브 커머스</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
            background: #f5f5f5;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e5e8eb;
            border-top-color: #3182F6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center">
        <div class="text-center">
            <div class="spinner mx-auto mb-6"></div>
            <h1 class="text-2xl font-bold text-gray-800 mb-2">결제 처리 중입니다</h1>
            <p class="text-gray-600">잠시만 기다려주세요...</p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        const API_BASE = '';
        
        // URL에서 결제 결과 파라미터 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        
        // NicePay 공식 가이드 파라미터명 (camelCase)
        const authResultCode = urlParams.get('authResultCode');
        const authResultMsg = urlParams.get('authResultMsg');
        const tid = urlParams.get('tid');
        const clientId = urlParams.get('clientId');
        const orderId = urlParams.get('orderId');
        const amount = urlParams.get('amount');
        const authToken = urlParams.get('authToken');
        const signature = urlParams.get('signature');
        
        console.log('📥 NicePay 결제창 응답:', {
            authResultCode,
            authResultMsg,
            tid,
            clientId: clientId?.substring(0, 10) + '...',
            orderId,
            amount
        });
        
        // 결제 결과 확인
        if (authResultCode === '0000') {
            // 결제 인증 성공 - 서버에 승인 요청
            confirmPayment();
        } else {
            // 결제 인증 실패
            console.error('❌ 결제 인증 실패:', authResultMsg);
            alert('결제에 실패했습니다.\n' + authResultMsg);
            window.location.href = '/cart';
        }
        
        async function confirmPayment() {
            try {
                console.log('🔵 서버 승인 요청 중...');
                
                // 서버에 결제 승인 요청 (NicePay 공식 가이드 파라미터)
                const response = await axios.post(`${API_BASE}/api/payments/nicepay/callback`, {
                    authResultCode,
                    authResultMsg,
                    tid,
                    clientId,
                    orderId,
                    amount,
                    authToken,
                    signature
                });
                
                if (response.data.success) {
                    console.log('✅ 결제 승인 완료!');
                    
                    // 주문 완료 페이지로 이동
                    window.location.href = '/order-complete?orderNo=' + orderId;
                } else {
                    throw new Error(response.data.error || '결제 승인에 실패했습니다');
                }
            } catch (error) {
                console.error('❌ 결제 승인 실패:', error);
                alert('결제 승인에 실패했습니다.\n고객센터로 문의해주세요.\n주문번호: ' + orderId);
                
                // 에러가 발생해도 주문은 생성되었으므로 주문 완료 페이지로 이동
                window.location.href = '/order-complete?orderNo=' + orderId;
            }
        }
    </script>
