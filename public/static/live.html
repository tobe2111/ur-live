
    <!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>유어 라이브 커머스 - 실시간 방송</title>
        <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
        
        <!-- Kakao SDK -->
        <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" 
                crossorigin="anonymous"></script>
        
        <!-- Firebase SDK -->
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
        
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            
            :root {
                --ur-blue: #3182F6;
                --ur-gray-900: #191F28;
                --ur-gray-700: #4E5968;
                --ur-gray-600: #6B7684;
            }
            
            body {
                font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
                overflow: hidden;
                position: fixed;
                width: 100%;
                height: 100%;
                background: #000;
            }
            
            /* YouTube Background - Full Screen */
            #youtube-container {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: 1;
                background: #000;
            }
            
            #youtube-player {
                width: 100%;
                height: 100%;
            }
            
            /* Gradient Overlay for readability */
            .gradient-overlay {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: 60%;
                background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 40%, transparent 100%);
                z-index: 2;
                pointer-events: none;
            }
            
            /* Top Header */
            .top-header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                padding: 12px 16px;
                padding-top: calc(12px + env(safe-area-inset-top));
                display: flex;
                align-items: center;
                justify-content: space-between;
                z-index: 100;
                background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
            }
            
            .live-badge {
                background: #ff4757;
                color: white;
                padding: 6px 12px;
                border-radius: 4px;
                font-size: 13px;
                font-weight: 700;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            
            .viewer-count {
                background: rgba(0,0,0,0.6);
                color: white;
                padding: 6px 12px;
                border-radius: 16px;
                font-size: 13px;
                display: flex;
                align-items: center;
                gap: 6px;
                backdrop-filter: blur(10px);
            }
            
            .close-btn {
                background: rgba(0,0,0,0.6);
                color: white;
                border: none;
                width: 36px;
                height: 36px;
                border-radius: 50%;
                font-size: 18px;
                cursor: pointer;
                backdrop-filter: blur(10px);
            }
            
            /* Chat Section - Bottom Left */
            .chat-container {
                position: fixed;
                bottom: 200px;
                left: 16px;
                width: calc(100% - 80px);
                max-width: 350px;
                max-height: 200px;
                z-index: 50;
                pointer-events: none;
            }
            
            .chat-message {
                background: rgba(0,0,0,0.5);
                backdrop-filter: blur(10px);
                color: white;
                padding: 8px 12px;
                border-radius: 16px;
                margin-bottom: 8px;
                font-size: 13px;
                line-height: 1.4;
                animation: fadeIn 0.3s ease-in;
                word-wrap: break-word;
            }
            
            .chat-username {
                font-weight: 700;
                margin-right: 6px;
                color: #ffd93d;
            }
            
            .system-message {
                background: rgba(49, 130, 246, 0.9);
                color: white;
                font-weight: 600;
            }
            
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            /* Product Card - Bottom Center (Toss Floating Style) */
            .product-card {
                position: fixed;
                bottom: 80px;
                bottom: calc(80px + env(safe-area-inset-bottom));
                left: 16px;
                right: 16px;
                background: white;
                border-radius: 20px;
                padding: 16px;
                box-shadow: 0 8px 24px rgba(0,0,0,0.3);
                z-index: 60;
                display: none;
                animation: slideUp 0.3s ease-out;
            }
            
            .product-card.show {
                display: block;
            }
            
            @keyframes slideUp {
                from {
                    transform: translateY(100%);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            
            .product-main {
                display: flex;
                gap: 12px;
                margin-bottom: 12px;
            }
            
            .product-image {
                width: 80px;
                height: 80px;
                border-radius: 12px;
                object-fit: cover;
                flex-shrink: 0;
            }
            
            .product-info {
                flex: 1;
                min-width: 0;
            }
            
            .product-name {
                font-size: 15px;
                font-weight: 700;
                color: var(--ur-gray-900);
                margin-bottom: 6px;
                overflow: hidden;
                text-overflow: ellipsis;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
            }
            
            .product-price {
                display: flex;
                align-items: baseline;
                gap: 6px;
                margin-bottom: 4px;
            }
            
            .discount-rate {
                color: #ff4757;
                font-size: 18px;
                font-weight: 700;
            }
            
            .current-price {
                color: var(--ur-gray-900);
                font-size: 18px;
                font-weight: 700;
            }
            
            .original-price {
                color: var(--ur-gray-600);
                font-size: 13px;
                text-decoration: line-through;
            }
            
            .product-stock {
                font-size: 12px;
                color: var(--ur-gray-600);
            }
            
            .add-to-cart-btn {
                width: 100%;
                background: var(--ur-blue);
                color: white;
                border: none;
                border-radius: 12px;
                padding: 14px;
                font-size: 16px;
                font-weight: 700;
                cursor: pointer;
                transition: all 0.2s;
            }
            
            .add-to-cart-btn:active {
                transform: scale(0.98);
            }
            
            /* Right Side Buttons (Like/Share) */
            .right-actions {
                position: fixed;
                right: 16px;
                bottom: 300px;
                bottom: calc(300px + env(safe-area-inset-bottom));
                display: flex;
                flex-direction: column;
                gap: 16px;
                z-index: 50;
            }
            
            .action-btn {
                width: 48px;
                height: 48px;
                border-radius: 50%;
                background: rgba(0,0,0,0.5);
                backdrop-filter: blur(10px);
                border: none;
                color: white;
                font-size: 20px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                transition: all 0.2s;
            }
            
            .action-btn:active {
                transform: scale(0.9);
            }
            
            .action-count {
                font-size: 11px;
                font-weight: 600;
                margin-top: 2px;
            }
            
            .liked {
                color: #ff4757;
            }
            
            /* No Product Message */
            .no-product {
                position: fixed;
                bottom: 100px;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0,0,0,0.7);
                backdrop-filter: blur(10px);
                color: white;
                padding: 12px 24px;
                border-radius: 24px;
                font-size: 14px;
                z-index: 60;
                display: none;
            }
            
            .no-product.show {
                display: block;
            }
            
            /* Loading */
            .loading {
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: white;
                font-size: 16px;
                z-index: 200;
            }
            
            /* Mobile Responsive */
            @media (max-width: 480px) {
                .chat-container {
                    max-width: calc(100% - 96px);
                }
                
                .product-card {
                    left: 12px;
                    right: 12px;
                }
                
                .product-main {
                    gap: 10px;
                }
                
                .product-image {
                    width: 70px;
                    height: 70px;
                }
                
                .product-name {
                    font-size: 14px;
                }
                
                .right-actions {
                    bottom: 280px;
                }
                
                .action-btn {
                    width: 44px;
                    height: 44px;
                    font-size: 18px;
                }
            }
        </style>
    </head>
    <body>
        <!-- YouTube Player Background -->
        <div id="youtube-container">
            <div id="youtube-player"></div>
        </div>
        
        <!-- Gradient Overlay -->
        <div class="gradient-overlay"></div>
        
        <!-- Top Header -->
        <div class="top-header">
            <div style="display: flex; gap: 12px; align-items: center;">
                <div class="live-badge">
                    <i class="fas fa-circle" style="font-size: 8px; animation: pulse 2s ease-in-out infinite;"></i>
                    LIVE
                </div>
                <div class="viewer-count">
                    <i class="fas fa-eye"></i>
                    <span id="viewer-count">0</span>
                </div>
            </div>
            <button class="close-btn" onclick="window.location.href='/'">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <!-- Chat Container (Bottom Left) -->
        <div class="chat-container" id="chat-container">
            <!-- Chat messages will be dynamically added here -->
        </div>
        
        <!-- Right Side Actions -->
        <div class="right-actions">
            <button class="action-btn" id="like-btn">
                <i class="fas fa-heart"></i>
                <span class="action-count" id="like-count">0</span>
            </button>
            <button class="action-btn" id="share-btn">
                <i class="fas fa-share-alt"></i>
            </button>
        </div>
        
        <!-- Product Card (Bottom Center - Toss Style) -->
        <div class="product-card" id="product-card">
            <div class="product-main">
                <img id="product-image" class="product-image" src="" alt="">
                <div class="product-info">
                    <div class="product-name" id="product-name"></div>
                    <div class="product-price">
                        <span class="discount-rate" id="discount-rate"></span>
                        <span class="current-price" id="current-price"></span>
                        <span class="original-price" id="original-price"></span>
                    </div>
                    <div class="product-stock" id="product-stock"></div>
                </div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="add-to-cart-btn" id="add-to-cart-btn" style="flex: 1;">
                    <i class="fas fa-shopping-bag"></i> 담기
                </button>
                <button class="add-to-cart-btn" id="checkout-btn" style="flex: 1; background: #ff4757;">
                    <i class="fas fa-credit-card"></i> 결제
                </button>
            </div>
        </div>
        
        <!-- No Product Message -->
        <div class="no-product" id="no-product">
            상품 준비 중입니다...
        </div>
        
        <!-- Loading -->
        <div class="loading" id="loading">
            <i class="fas fa-spinner fa-spin"></i> 로딩 중...
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
        <script src="https://www.youtube.com/iframe_api"></script>
        <script>
            // Initialize Kakao SDK
            if (window.Kakao && !Kakao.isInitialized()) {
                Kakao.init('975a2e7f97254b08f15dba4d177a2865'); // Your Kakao App Key
                console.log('✅ Kakao SDK initialized');
            }
            
            // Get stream ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const STREAM_ID = urlParams.get('streamId') || window.location.pathname.split('/').pop();
            const API_BASE = '/api';
            let currentProduct = null;
            let likeCount = 0;
            let liked = false;
            let player = null;
            let chatMessages = [];
            const MAX_CHAT_MESSAGES = 5;
            
            // Initialize
            document.addEventListener('DOMContentLoaded', async () => {
                // Check for login callback
                const urlParams = new URLSearchParams(window.location.search);
                const loginStatus = urlParams.get('login');
                const sessionToken = urlParams.get('session');
                const userId = urlParams.get('userId');
                const userName = urlParams.get('userName');
                
                if (loginStatus === 'success' && sessionToken) {
                    // Save session to localStorage
                    localStorage.setItem('session', sessionToken);
                    localStorage.setItem('userId', userId);
                    localStorage.setItem('userName', decodeURIComponent(userName || '카카오 사용자'));
                    
                    console.log('✅ 로그인 성공:', {
                        session: sessionToken,
                        userId: userId,
                        userName: userName
                    });
                    
                    // Show success message
                    alert('로그인 되었습니다! 환영합니다, ' + decodeURIComponent(userName || '카카오 사용자') + '님!');
                    
                    // Clean URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
                
                await loadStreamData();
                initFirebase();
                startProductPolling();
                setupEventListeners();
            });
            
            // Kakao login function
            function kakaoLogin() {
                if (!window.Kakao || !Kakao.isInitialized()) {
                    alert('카카오 SDK가 초기화되지 않았습니다. 페이지를 새로고침해주세요.');
                    return;
                }
                
                const currentPath = window.location.pathname;
                const redirectUri = window.location.origin + '/auth/kakao/sync/callback';
                
                console.log('Starting Kakao login:', { currentPath, redirectUri });
                
                Kakao.Auth.authorize({
                    redirectUri: redirectUri,
                    state: currentPath
                });
            }
            
            // Load stream and product data
            async function loadStreamData() {
                try {
                    const response = await axios.get(API_BASE + "/streams/" + STREAM_ID);
                    if (response.data.success) {
                        const stream = response.data.data;
                        
                        // Initialize YouTube player
                        initYouTubePlayer(stream.youtube_video_id);
                        
                        // Load current product
                        updateProduct(stream);
                        
                        document.getElementById('loading').style.display = 'none';
                    }
                } catch (error) {
                    console.error('Failed to load stream:', error);
                    alert('라이브 스트림을 불러올 수 없습니다.');
                }
            }
            
            // Initialize YouTube Player
            function initYouTubePlayer(videoId) {
                player = new YT.Player('youtube-player', {
                    videoId: videoId,
                    playerVars: {
                        autoplay: 1,
                        controls: 1,
                        modestbranding: 1,
                        rel: 0,
                        showinfo: 0,
                        fs: 1,
                        playsinline: 1
                    },
                    events: {
                        onReady: (event) => {
                            event.target.playVideo();
                        }
                    }
                });
            }
            
            // Update product display
            function updateProduct(stream) {
                const productCard = document.getElementById('product-card');
                const noProduct = document.getElementById('no-product');
                
                if (stream.current_product_id && stream.product_name) {
                    currentProduct = {
                        id: stream.current_product_id,
                        name: stream.product_name,
                        price: stream.price,
                        original_price: stream.original_price,
                        discount_rate: stream.discount_rate,
                        image_url: stream.image_url,
                        stock: stream.stock
                    };
                    
                    document.getElementById('product-image').src = currentProduct.image_url || 'https://via.placeholder.com/80';
                    document.getElementById('product-name').textContent = currentProduct.name;
                    document.getElementById('discount-rate').textContent = currentProduct.discount_rate ? currentProduct.discount_rate + "%" : '';
                    document.getElementById('current-price').textContent = formatPrice(currentProduct.price) + '원';
                    document.getElementById('original-price').textContent = currentProduct.original_price ? formatPrice(currentProduct.original_price) + '원' : '';
                    document.getElementById('product-stock').textContent = "재고 " + currentProduct.stock + "개";
                    
                    productCard.classList.add('show');
                    noProduct.classList.remove('show');
                } else {
                    currentProduct = null;
                    productCard.classList.remove('show');
                    noProduct.classList.add('show');
                }
            }
            
            // Poll for product updates (every 3 seconds)
            function startProductPolling() {
                setInterval(async () => {
                    try {
                        const response = await axios.get(API_BASE + "/streams/" + STREAM_ID);
                        if (response.data.success) {
                            const stream = response.data.data;
                            const newProductId = stream.current_product_id;
                            
                            // Check if product changed
                            if (currentProduct?.id !== newProductId) {
                                updateProduct(stream);
                                
                                // Show system message
                                if (newProductId) {
                                    addSystemMessage("새 상품: " + stream.product_name);
                                }
                            }
                        }
                    } catch (error) {
                        console.error('Failed to poll product:', error);
                    }
                }, 3000);
            }
            
            // Initialize Firebase for chat
            function initFirebase() {
                fetch('/static/firebase-config.js')
                    .then(r => r.text())
                    .then(configText => {
                        eval(configText);
                        
                        const database = firebase.database();
                        const chatRef = database.ref("chats/stream_" + STREAM_ID);
                        
                        chatRef.limitToLast(MAX_CHAT_MESSAGES).on('child_added', (snapshot) => {
                            const message = snapshot.val();
                            addChatMessage(message.username, message.message);
                        });
                    })
                    .catch(err => console.error('Firebase init failed:', err));
            }
            
            // Add chat message
            function addChatMessage(username, message) {
                const container = document.getElementById('chat-container');
                const messageEl = document.createElement('div');
                messageEl.className = 'chat-message';
                messageEl.innerHTML = "<span class='chat-username'>" + username + "</span>" + message;
                
                container.appendChild(messageEl);
                
                // Keep only last 5 messages
                chatMessages.push(messageEl);
                if (chatMessages.length > MAX_CHAT_MESSAGES) {
                    const oldMessage = chatMessages.shift();
                    oldMessage.remove();
                }
            }
            
            // Add system message
            function addSystemMessage(message) {
                const container = document.getElementById('chat-container');
                const messageEl = document.createElement('div');
                messageEl.className = 'chat-message system-message';
                messageEl.textContent = message;
                
                container.appendChild(messageEl);
                
                chatMessages.push(messageEl);
                if (chatMessages.length > MAX_CHAT_MESSAGES) {
                    const oldMessage = chatMessages.shift();
                    oldMessage.remove();
                }
            }
            
            // Setup event listeners
            function setupEventListeners() {
                // Add to cart
                document.getElementById('add-to-cart-btn').addEventListener('click', async () => {
                    if (!currentProduct) {
                        alert('상품을 선택해주세요!');
                        return;
                    }
                    
                    try {
                        // Check login
                        const userId = localStorage.getItem('userId');
                        if (!userId) {
                            alert('로그인이 필요합니다. 카카오 로그인 페이지로 이동합니다.');
                            kakaoLogin();
                            return;
                        }
                        
                        console.log('Adding to cart:', {
                            userId: userId,
                            product_id: currentProduct.id,
                            quantity: 1,
                            live_stream_id: parseInt(STREAM_ID)
                        });
                        
                        // Add to cart
                        const response = await axios.post(API_BASE + "/cart", {
                            userId: userId,
                            productId: currentProduct.id,
                            quantity: 1,
                            priceSnapshot: currentProduct.price,
                            liveStreamId: parseInt(STREAM_ID)
                        });
                        
                        if (response.data.success) {
                            alert('장바구니에 추가되었습니다!');
                            addSystemMessage(currentProduct.name + " 상품이 담겼습니다!");
                        } else {
                            throw new Error(response.data.error || '장바구니 추가에 실패했습니다');
                        }
                    } catch (error) {
                        console.error('Failed to add to cart:', error);
                        alert('장바구니 추가에 실패했습니다.\n' + (error.response?.data?.error || error.message));
                    }
                });
                
                // Checkout button
                document.getElementById('checkout-btn').addEventListener('click', async () => {
                    try {
                        // Check login
                        const userId = localStorage.getItem('userId');
                        if (!userId) {
                            // 로그인 필요 - 바로 카카오 로그인 진행
                            kakaoLogin();
                            return;
                        }
                        
                        console.log('Checking cart for userId:', userId);
                        
                        // Check cart
                        const cartResponse = await axios.get(API_BASE + "/cart/" + userId);
                        console.log('Cart response:', cartResponse.data);
                        
                        const cartItems = cartResponse.data.data || [];
                        
                        if (cartItems.length === 0) {
                            alert('상품을 먼저 담아주세요!');
                            return;
                        }
                        
                        // Redirect to checkout page
                        window.location.href = '/cart';
                    } catch (error) {
                        console.error('Failed to checkout:', error);
                        alert('결제를 진행할 수 없습니다.\n' + (error.response?.data?.error || error.message));
                    }
                });
                
                // Like button
                document.getElementById('like-btn').addEventListener('click', () => {
                    liked = !liked;
                    const btn = document.getElementById('like-btn');
                    const icon = btn.querySelector('i');
                    
                    if (liked) {
                        icon.classList.remove('far');
                        icon.classList.add('fas', 'liked');
                        likeCount++;
                    } else {
                        icon.classList.remove('liked');
                        likeCount--;
                    }
                    
                    document.getElementById('like-count').textContent = likeCount > 0 ? likeCount : '';
                });
                
                // Share button
                document.getElementById('share-btn').addEventListener('click', async () => {
                    const url = window.location.href;
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: '유어 라이브 커머스',
                                text: '실시간 라이브 방송을 시청하세요!',
                                url: url
                            });
                        } catch (error) {
                            console.log('Share cancelled');
                        }
                    } else {
                        // Fallback: copy to clipboard
                        navigator.clipboard.writeText(url);
                        alert('링크가 복사되었습니다!');
                    }
                });
            }
            
            // Format price
            function formatPrice(price) {
                return new Intl.NumberFormat('ko-KR').format(price);
            }
            
            // Pulse animation for LIVE badge
            const style = document.createElement('style');
            style.textContent = "
                @keyframes pulse {
                    0%, 100% { opacity: 1; }
                    50% { opacity: 0.5; }
                }
            ";
            document.head.appendChild(style);
        </script>
    </body>
    </html>
