<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A0010"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F43F5E"/>
    </linearGradient>
    <radialGradient id="glow" cx="18%" cy="28%" r="60%">
      <stop offset="0%" stop-color="rgba(236,72,153,0.22)"/>
      <stop offset="100%" stop-color="rgba(236,72,153,0)"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- UR 마크 -->
  <rect x="80" y="82" width="132" height="132" rx="34" fill="url(#brand)"/>
  <text x="146" y="150" font-family="Arial, sans-serif" font-weight="800" font-size="74" letter-spacing="-4" text-anchor="middle" dominant-baseline="central" fill="#FFFFFF">UR</text>

  <!-- 워드마크 -->
  <text x="240" y="182" font-family="sans-serif" font-weight="800" font-size="92" letter-spacing="-3" fill="#FFFFFF">유어딜</text>

  <!-- 메인 타이포 -->
  <text x="80" y="366" font-family="sans-serif" font-weight="800" font-size="72" letter-spacing="-3" fill="url(#brand)">이용권 · 교환권 · 동네딜</text>

  <!-- 설명 -->
  <text x="82" y="440" font-family="sans-serif" font-weight="500" font-size="34" letter-spacing="-1" fill="#C9CDD3">동네 가게 공동구매로 결제하고, 딜 적립까지 한 곳에서</text>

  <!-- 좌측 하단 액센트 라인 -->
  <rect x="82" y="486" width="92" height="6" rx="3" fill="url(#brand)"/>

  <!-- 우측 하단 도메인 -->
  <text x="1120" y="588" font-family="sans-serif" font-weight="600" font-size="22" letter-spacing="0.02em" fill="#8A9099" text-anchor="end">live.ur-team.com</text>
</svg>
