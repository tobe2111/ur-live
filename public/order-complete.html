<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 완료 - 유어 라이브 커머스</title>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
            background: #f5f5f5;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            animation: scaleIn 0.5s ease-out;
        }
        
        @keyframes scaleIn {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #191F28;
            margin-bottom: 12px;
        }
        
        .subtitle {
            font-size: 15px;
            color: #6B7684;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        
        .order-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: left;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e5e8eb;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-size: 14px;
            color: #6B7684;
        }
        
        .info-value {
            font-size: 15px;
            font-weight: 600;
            color: #191F28;
        }
        
        .order-number {
            color: #3182F6;
            font-weight: 700;
            word-break: break-all;
        }
        
        .button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        
        .button-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .button-secondary {
            background: white;
            color: #6B7684;
            border: 1px solid #e5e8eb;
        }
        
        .button-secondary:hover {
            background: #f8f9fa;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e5e8eb;
            border-top-color: #3182F6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 로딩 상태 -->
        <div id="loading-state" class="loading">
            <div class="spinner"></div>
            <p style="color: #6B7684; font-size: 15px;">주문 정보를 불러오는 중...</p>
        </div>
        
        <!-- 성공 상태 -->
        <div id="success-state" style="display: none;">
            <div class="success-icon">
                <i class="fas fa-check" style="color: white; font-size: 40px;"></i>
            </div>
            
            <div class="card">
                <h1 class="title">주문이 완료되었습니다!</h1>
                <p class="subtitle">
                    주문해주셔서 감사합니다.<br>
                    빠른 시일 내에 배송해드리겠습니다.
                </p>
                
                <div class="order-info">
                    <div class="info-row">
                        <span class="info-label">주문번호</span>
                        <span class="info-value order-number" id="order-number">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">주문일시</span>
                        <span class="info-value" id="order-date">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">결제금액</span>
                        <span class="info-value" id="order-amount">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">배송 상태</span>
                        <span class="info-value" style="color: #3182F6;">
                            <i class="fas fa-box"></i> 주문 접수
                        </span>
                    </div>
                </div>
                
                <button class="button button-primary" onclick="goToOrders()">
                    <i class="fas fa-list"></i> 주문 내역 보기
                </button>
                
                <button class="button button-secondary" onclick="goToHome()">
                    <i class="fas fa-home"></i> 홈으로 가기
                </button>
            </div>
        </div>
        
        <!-- 에러 상태 -->
        <div id="error-state" style="display: none;">
            <div class="card">
                <div style="margin-bottom: 24px;">
                    <i class="fas fa-exclamation-circle" style="font-size: 48px; color: #ff3b30;"></i>
                </div>
                <h1 class="title">주문 정보를 불러올 수 없습니다</h1>
                <p class="subtitle">
                    잠시 후 다시 시도해주세요.
                </p>
                
                <button class="button button-primary" onclick="location.reload()">
                    <i class="fas fa-redo"></i> 다시 시도
                </button>
                
                <button class="button button-secondary" onclick="goToHome()">
                    <i class="fas fa-home"></i> 홈으로 가기
                </button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <script>
        const API_BASE = '';
        
        // URL에서 주문번호 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const orderNo = urlParams.get('orderNo');
        
        console.log('Order Number:', orderNo);
        
        if (!orderNo) {
            showError();
        } else {
            loadOrderInfo();
        }
        
        async function loadOrderInfo() {
            try {
                // 주문 정보 조회
                const response = await axios.get(`${API_BASE}/api/orders/${orderNo}`);
                
                if (response.data.success) {
                    const order = response.data.data;
                    displayOrder(order);
                } else {
                    throw new Error('주문 정보를 불러올 수 없습니다');
                }
            } catch (error) {
                console.error('Failed to load order:', error);
                showError();
            }
        }
        
        function displayOrder(order) {
            // 주문번호
            document.getElementById('order-number').textContent = order.order_number;
            
            // 주문일시
            const orderDate = new Date(order.created_at);
            document.getElementById('order-date').textContent = orderDate.toLocaleString('ko-KR', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            // 결제금액
            document.getElementById('order-amount').textContent = 
                order.total_amount.toLocaleString() + '원';
            
            // 로딩 숨기고 성공 표시
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('success-state').style.display = 'block';
            
            // localStorage에서 장바구니 플래그 제거
            localStorage.removeItem('hasCartItems');
        }
        
        function showError() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
        }
        
        function goToOrders() {
            // TODO: 주문 내역 페이지로 이동
            alert('주문 내역 페이지는 준비 중입니다.');
            goToHome();
        }
        
        function goToHome() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
